  assets: "Close icon and caret item are captured as DS asset-backed visuals."
  layout: "Large and Medium padding, typography, caret size, and max width guidance are reflected."
  exclusions: "Full 96-row variant registry is summarized with registry_policy; no derived tooltip.md file is generated."

rules:
  do:
    - "Use Tooltip for guidance that is less critical than a Dialog and tied to a specific object."
    - "Keep copy concise: Single line uses one line; Multi lines use at least two and at most eight lines."
    - "Use a maximum width of 240px."
    - "Choose close button or auto-dismiss behavior according to the message purpose."
    - "Keep margin from screen edges so the tooltip remains readable."
  dont:
    - "Do not use Tooltip for standalone announcements or long guidance."
    - "Do not exceed eight lines of text."
    - "Do not stretch Tooltip width across the screen."
    - "Do not use Top caret positions when the target is near the top edge and would cause clipping."
    - "Do not allow Tooltip to overlap a header layer while scrolling."

