  - "Select Mode, Size, Color, and Position variant."
  - "Apply Size-specific content padding and typography."
  - "Apply Color-specific Contents, Label, close icon, and caret tokens."
  - "Place the caret according to Position and keep it connected to the target."
  - "Apply Button_Close visibility after layout so text width and close affordance remain stable."
  - "Apply White_fixed shadow treatment after color tokens."

