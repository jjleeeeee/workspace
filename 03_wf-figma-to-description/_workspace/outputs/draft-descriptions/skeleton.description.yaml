rules:
  do:
    - "Use Skeleton to reserve space while real content is loading."
    - "Match Skeleton Type and Size to the expected content shape."
    - "Keep the Gradient clipped inside the Skeleton shape."
    - "Use Fixed mode when the Skeleton must stay stable on fixed dark surfaces."
  dont:
    - "Do not use Skeleton as final content."
    - "Do not change the gradient stop positions or alpha values without a design update."
    - "Do not use Line or Rectangle when the target content is circular."
    - "Do not expose loading text inside the Skeleton shape."

