layout:
  component_size: "varies by OS and Size"
  sizes:
    "OS=iOS, Size=Medium":
      track: "52x32px"
      thumb: "28x28px"
      padding: "2px"
    "OS=iOS, Size=Small":
      track: "32x20px"
      thumb: "16x16px"
      padding: "2px"
    "OS=iOS, Size=Small, Mode=Fixed, Status=Enabled":
      track: "32x18.5px"
      thumb: "16x16px"
      padding: "1.25px"
    "OS=AOS, Size=Medium":
      track: "52x32px"
      thumb: "24x24px"
      padding: "4px"
    "OS=AOS, Size=Small":
      track: "34x20px"
      thumb: "14x14px"
      padding: "3px"
  radius:
    iOS: "100px"
    AOS_Medium: "100px"
    AOS_Small: "62.5px"
  thumb_position:
    Default: "left"
    Enabled: "right"
    Disabled: "left"
  part_spacing:
    "Track__to__Switch":
      variation_checked_by:
        axes: true
        props: true
        states: true
      default:
        token: "component geometry"
        value: "thumb inset equals platform padding"
      variants:
      - when: "OS=iOS, Size=Medium"
        token: "component geometry"
        value: "2px"
      - when: "OS=iOS, Size=Small"
        token: "component geometry"
        value: "2px"
      - when: "OS=AOS, Size=Medium"
        token: "component geometry"
        value: "4px"
      - when: "OS=AOS, Size=Small"
        token: "component geometry"
        value: "3px"

interaction:
  toggle:
    behavior: "Switch state changes should apply immediately without a separate save action."
  disabled:
    behavior: "Disabled variants are inactive and must not appear visually enabled."

implementation_order:
  - "Select OS and Size before resolving geometry."
  - "Resolve Status to place the Switch thumb left or right."
  - "Apply Mode-specific track token after Status is known."
  - "Apply disabled track and thumb overrides last."
  - "Keep platform-specific geometry consistent within one platform surface."

implementation_coverage:
  axes: "All 24 Mode, OS, Size, and Status variants were live-read from Figma."
  props: "Variant props map directly to Mode, OS, Size, and Status."
  assets: "No external asset-backed visuals; Track and Switch are primitive shapes."
  layout: "Platform-specific track, thumb, padding, radius, and thumb position are reflected."
  exclusions: "No derived toggle-switch.md file is generated by this workflow."

rules:
  do:
    - "Use Toggle when a setting changes immediately after the user switches it."
    - "Use the OS variant that matches the platform context."
    - "Use Default, Enabled, and Disabled states to communicate OFF, ON, and inactive status."
    - "Pair the Toggle with a label that explains the setting being changed."
  dont:
    - "Do not mix iOS and AOS Toggle variants inside one platform screen."
    - "Do not use Toggle for choices that require a separate save or confirmation step."
    - "Do not recolor Toggle with community-specific colors outside the defined tokens."
    - "Do not use Toggle for a single consent or confirmation; use Checkbox instead."

