props:
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default uses adaptive color tokens; Fixed uses fixed color tokens."
  OS:
    type: '"iOS" | "AOS"'
    default: '"iOS"'
    description: "Selects platform-specific track and thumb sizing."
  Size:
    type: '"Medium" | "Small"'
    default: '"Medium"'
    description: "Controls overall switch and thumb dimensions."
  Status:
    type: '"Default" | "Enabled" | "Disabled"'
    default: '"Default"'
    description: "Controls OFF, ON, and inactive visual treatment."

