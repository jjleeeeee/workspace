assets:
  radio_shape:
    part: "Shape"
    source_node: "Shape"
    semantic_rule: "Visible in Enabled state as the selected outer fill."
  inner_circle:
    part: "inner-circle"
    source_node: "inner-circle"
    semantic_rule: "Visible in Enabled and Disabled states; Default state must remain an empty circle."

layout:
  component_size: "24x24"
  outline_diameter: 22
  inner_diameter: 8
  label_gap: 6

interaction:
  selection:
    behavior: "Only one Radio in a group should be Enabled."
  default_selection:
    behavior: "A Radio group should generally expose a recommended or common default selection."

implementation_order:
- "Select Mode and Status variant."
- "Render a 24x24 control with 22px outline diameter."
- "For Default state, render an empty circle without a dot."
- "For Enabled state, render Shape and inner-circle."
- "For Disabled state, render disabled background and disabled inner circle."
- "Keep Radio + Text gap at 6px when paired with labels."

implementation_coverage:
  axes:
  - "Mode"
  - "Status"
  props:
  - "Mode"
  - "Status"
  assets:
  - "radio_shape"
  - "inner_circle"
  layout:
  - "24x24 component"
  - "22px outline"
  - "8px inner circle"
  - "6px label gap"
  exclusions:
  - "This workflow does not create a derived radio.md file."

rules:
  do:
  - "Use Radio when users must select exactly one item from multiple options."
  - "Use the same control type within the same selection group."
  - "Select the most recommended or common option by default."
  - "Use Check Box for independent agreement, approval, or confirmation."
  - "Show the unselected state as an empty circle."
  dont:
  - "Do not use Radio for multi-select options."
  - "Do not mix Radio and Check Box in the same selection group."
  - "Do not expose a Radio group with all options unselected."
  - "Do not use Radio for a single Yes or No decision."
  - "Do not show a dot before selection."

