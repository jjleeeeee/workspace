assets:
  leading_avatar:
    part: "Leading"
    role: "avatar"
    source: "[V2] Avatar through Avatar Group"
    component_set_key: "33d955018e09fb10ab89cefc8f00f2662a2b0e39"
    applies_to: "Align=Left, Leading=true"
    semantic_rule: "Use the nested Avatar component only when the leading area identifies a subject."
  leading_center_icon:
    part: "Leading"
    role: "icon"
    source: "icon_area through atoms / leading_Center"
    component_set_key: "0befc61ab89f810594677109814548f8cde49928"
    applies_to: "Align=Center, Leading=true"
    semantic_rule: "Use the DS icon_area component for the center leading icon slot."
  badge_icons:
    part: "Title and subtitle badges"
    role: "icon"
    source: "icon_area, size=xxsmall(12), em=On"
    component_set_key: "0befc61ab89f810594677109814548f8cde49928"
    applies_to: "Badge_1, Badge_2, Title_Badge, and Sub_Badge controls"
    semantic_rule: "Badge icon slots remain icon_area instances and should not be replaced by inline text."
  metadata_tags:
    part: "Multiple tags"
    role: "tag"
    source: "Tag and Tag / elements / Tint_Small"
    component_set_key: "0da6722ea2b5a431721cd72b9bb00df3367edc1c"
    applies_to: "Multiple tag boolean controls"
    semantic_rule: "Use DS Tag components for metadata tags."

composition:
  uses:
  - component_set: "Avatar Group (디자인 개별 사용금지)"
    component_set_key: "6ad2e4b184997b01a86fa87e803387200dcca643"
    purpose: "Leading avatar grouping for Align=Left."
    consumer_contract: "Leading=true can expose avatar-based identification in left title headers."
  - component_set: "[V2] Avatar"
    component_set_key: "33d955018e09fb10ab89cefc8f00f2662a2b0e39"
    purpose: "Avatar visual inside the left leading area."
    consumer_contract: "Avatar appearance is owned by the Avatar component."
  - component_set: "Tag"
    component_set_key: "0da6722ea2b5a431721cd72b9bb00df3367edc1c"
    purpose: "Metadata tags in the Multiple area."
    consumer_contract: "Multiple tag boolean controls show or hide DS Tag instances."
  - component_set: "atoms / trailing"
    component_set_key: "e347d6dfee99c5f46be383a6f2fe056bffb8c30f"
    purpose: "Trailing text and icon group."
    consumer_contract: "Trailing=true exposes the trailing group without copying its child spec into Title Header."

