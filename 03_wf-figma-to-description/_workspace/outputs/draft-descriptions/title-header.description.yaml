  node_id: "64450:27844"
  component_set_key: "33261ba4635ef136dd94de771e9ded865a98c6d4"
  last_synced: "2026-05-09"

axes:
  Mode: ["Default", "Fixed"]
  Align: ["Left", "Center"]

variants:
  count: 4
  formula: "Mode(2) x Align(2)"
  constraints:
  - "All Mode and Align combinations are present in live Figma."
  - "Slot and boolean controls are component properties, not variant axes."
  registry:
  - {variant: "Mode=Default, Align=Left", node_id: "64450:28044", key: "d58508050fa6843f5e234d0fe8fa929afe1beb46"}
  - {variant: "Mode=Fixed, Align=Left", node_id: "68998:22347", key: "ccdadd57d18d51db17d2bbe7a28913ddfacd9a94"}
  - {variant: "Mode=Default, Align=Center", node_id: "65513:23665", key: "2604a482e1d7a9947c6aa335056cd6dd05907169"}
  - {variant: "Mode=Fixed, Align=Center", node_id: "65513:23700", key: "93d1df27e4c3ebf83da13fab48c626ae0767b9b6"}

