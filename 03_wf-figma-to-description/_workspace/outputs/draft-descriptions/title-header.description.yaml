implementation_order:
- "Resolve Mode first because text and detail tokens switch between semantic and fixed token families."
- "Resolve Align next because Left and Center use different padding, leading structure, and title alignment."
- "Apply the fixed 48px height before optional content so the header does not resize."
- "Apply Leading, Trailing, title, subtitle, badge, and Multiple controls as visibility or slot composition only."
- "Use nested Avatar, Tag, and trailing components without copying their child specs into Title Header."
- "Keep title content to one line and avoid navigation behavior."

implementation_coverage:
  axes: "Implement all four Mode x Align variants."
  props: "Include live boolean and slot component properties for marquee, leading, trailing, badges, title/subtitle multiple states, and metadata tags."
  assets: "Avatar, badge/icon slots, Tag metadata, and trailing group are captured as nested DS-backed visuals."
  layout: "48px fixed height, 393px live width, align-specific padding, gaps, text alignment, and major child frame sizes are reflected."
  exclusions: "Do not treat Title Header as Top Navigation, page navigation, multiline body copy, or a fixed screen header."

rules:
  do:
  - "Use Title Header to show the current content group's title and supporting information inside a screen."
  - "Choose Left or Center alignment based on the information hierarchy."
  - "Keep the height fixed at 48px."
  - "Keep short text titles to one line."
  - "Use text button, dropdown, or trailing support only when a simple secondary action is needed."
  - "Use avatar with text only when it helps identify a subject."
  dont:
  - "Do not mix Left and Center alignment arbitrarily in the same screen."
  - "Do not put two or more title lines into Title Header."
  - "Do not use Title Header for page navigation or complex navigation structure."
  - "Do not add multiple complex actions that exceed the header role."
  - "Do not use Title Header as a fixed top navigation area."
  - "Do not add avatar decoration without identification meaning."

spec_notes:
  source:
    variant_registry: "refs/figma-component-keys/variant-keys/title-header.md"
    figma_live_read: "use_figma read-only extraction on 2026-05-08"
  usage:
  - "Title Header is a pattern for title and information inside the current screen."
  - "It differs from Top Navigation because it does not provide page movement."

source_gaps:
- part: "Membership and gradient mask internals"
  field: "assets"
  reason: "Live readback confirmed vector/img_integratedmembership_gradient and Gradient_Mask instances, but usage guidance does not define them as independent consumer-facing component contracts."
- part: "Fixed Left nested subtitle"
  field: "tokens"
  reason: "Live readback found both fixed_color and semantic gray-500 subtitle tokens inside the Fixed Left variant due to nested multiple-slot content; the main subtitle token mapping records the fixed
    token while this mixed nested content is noted here."
- part: "Multiple slots"
  field: "slot content"
  reason: "Live Figma exposes SLOT properties with empty preferredValues, so this draft records slot existence and confirmed visible sample content without inventing slot value constraints."

