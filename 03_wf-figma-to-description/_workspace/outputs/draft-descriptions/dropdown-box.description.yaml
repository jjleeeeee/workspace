assets:
  dropdown_arrow_icon:
    part: "icon_area"
    role: "icon"
    source: "24/em/ic_arrow_down_medium | 24/em/ic_arrow_down_fold_medium"
    applies_to: "Closed states use arrow_down; open states use arrow_down_fold."
    size: "16x16px"
    implementation: "Use the existing DS icon instance; do not redraw the chevron with CSS."
    semantic_rule: "Arrow direction communicates open state and must remain an icon asset."
  badge_dot:
    part: "Badge_Dot"
    role: "badge"
    source: "Badge_Dot component set"
    applies_to: "Show_Badge_Dot=true"
    size: "4x4px"
    implementation: "Use Badge_Dot component set rather than a raw ellipse."
    semantic_rule: "Badge_Dot is a status marker, not text content."

