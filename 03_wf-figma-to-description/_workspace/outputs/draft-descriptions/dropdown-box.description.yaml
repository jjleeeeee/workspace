    role: "required or notification marker beside title"
    usage_condition: "Show_Badge_Dot=true"
    spec_owner: "Badge_Dot component set"
  - component: "[V2] List_Item_Native"
    node_id: "57343:18628"
    component_set_key: "e120970b1638c0fa7a5b7638923eb91479384ebe"
    role: "dropdown menu option row"
    usage_condition: "State=Enabled_Down or State=Enabled_Up"
    spec_owner: "[V2] List_Item_Native component set"
  - component: "[V2] Divider"
    node_id: "59215:76787"
    component_set_key: "a4421d92006feceff814786c7733c63403cebf92"
    role: "separator inside open menu list"
    usage_condition: "open list states"
    spec_owner: "[V2] Divider component set"
  - component: "Scrollbar"
    node_id: "27782:8837"
    component_set_key: "ec2d17107a68bb443f80245ab791fb69380f0a50"
    role: "scroll position indicator for open menu"
    usage_condition: "Show_Scrollbar=true and list content overflows"
    spec_owner: "Scrollbar component set"

