props:
  Label_Title:
    type: "text"
    default: "Title"
    description: "Title text shown when Show Title is true."
  Label_Guide:
    type: "text"
    default: "Guide Message"
    description: "Guide message text shown when Show Guide is true."
  Label_Text:
    type: "text"
    default: "Select Option"
    description: "Closed field placeholder or selected value text."
  Show_Title:
    type: "boolean"
    default: "true"
    description: "Controls the Title row visibility."
  Show_Guide:
    type: "boolean"
    default: "true"
    description: "Controls the Guide Message row visibility."
  Show_Scrollbar:
    type: "boolean"
    default: "true"
    description: "Controls Scrollbar visibility in open dropdown states."
  Show_Badge_Dot:
    type: "boolean"
    default: "true"
    description: "Controls required or notification dot visibility beside the title."
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default uses adaptive color tokens; Fixed uses fixed_color tokens."
  State:
    type: '"Default" | "Pressed (Hover)" | "Enabled_Down" | "Enabled_Up" | "Completed" | "Error" | "Disabled"'
    default: '"Default"'
    description: "Controls closed, hover, open, completed, error, and disabled visual treatments."

