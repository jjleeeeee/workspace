props:
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default adapts to OS theme; Fixed stays in fixed dark-theme colors."
  Size:
    type: '"Small" | "Medium" | "Large"'
    default: '"Medium"'
    description: "Controls Dot Badge diameter."
  Outline:
    type: '"OFF" | "ON"'
    default: '"ON"'
    description: "Controls whether the badge has a reverse outline stroke."

tokens:
  dot_fill_default:
    part: "Badge_Dot"
    role: "fill"
    applies_to: "Mode=Default"
    token: "system/color/status/danger-red"
    resolved:
      light: '#FE5B58'
      dark: '#FE5B58'
  dot_fill_fixed:
    part: "Badge_Dot"
    role: "fill"
    applies_to: "Mode=Fixed"
    token: "system/fixed_color/status/danger-red"
    resolved:
      light: '#FE5B58'
      dark: '#FE5B58'
  outline_default:
    part: "Badge_Dot"
    role: "stroke"
    applies_to: "Mode=Default, Outline=ON"
    token: "system/color/outline/default-reverse"
    resolved:
      light: '#FFFFFF'
      dark: '#000000'
  outline_fixed:
    part: "Badge_Dot"
    role: "stroke"
    applies_to: "Mode=Fixed, Outline=ON"
    token: "system/fixed_color/outline/default-reverse"
    resolved:
      light: '#000000'
      dark: '#000000'
  radius:
    part: "Badge_Dot"
    role: "corner radius"
    token: "pill / 100"

assets:
  dot_shape:
    part: "Badge_Dot"
    source_node: "component root ellipse-like shape"
    semantic_rule: "Render as a circular dot with pill radius; do not replace with text content."

layout:
  off_size:
    Small: "4x4"
    Medium: "6x6"
    Large: "8x8"
  on_size:
    Small: "6x6"
    Medium: "8x8"
    Large: "12x12"
  stroke_weight:
    Small_ON: 1
    Medium_ON: 1
    Large_ON: 2
  radius: 100

interaction:
  notification:
    behavior: "Use Dot Badge when only presence of an update or status matters, not the exact count."

implementation_order:
  - "Select Mode, Size, and Outline variant."
  - "Apply mode-specific danger-red fill token."
  - "Use OFF sizes for badges without outline and ON sizes for badges with outline."
  - "When Outline=ON, apply mode-specific default-reverse outline token."
  - "Use 1px outline for Small and Medium; use 2px outline for Large."
  - "Render as a circular shape with 100 radius."

implementation_coverage:
  axes:
  - "Mode"
  - "Size"
  - "Outline"
  props:
  - "Mode"
  - "Size"
  - "Outline"
  assets:
  - "dot_shape"
  layout:
  - "OFF sizes 4/6/8"
  - "ON sizes 6/8/12"
  - "1px and 2px outline rules"
  exclusions:
  - "This workflow does not create a derived badge-dot.md file."
  - "Do/Don't product guidance is not present in markitdown-badge.md."

rules:
  do:
    - "Use Dot Badge for notification or status presence on navigation items and icons."
    - "Use Outline=ON when the badge needs separation from the background or icon surface."
    - "Keep the badge circular and use the provided size variants."
  dont:
    - "Do not use Dot Badge when an exact count or New label is required."
    - "Do not render Dot Badge as text."
    - "Do not invent sizes outside Small, Medium, and Large."

spec_notes:
  source:
  - "Figma component metadata and compact Plugin API extraction from node 8451:112783."
