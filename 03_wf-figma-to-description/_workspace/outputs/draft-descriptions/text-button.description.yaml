assets:
  leading_icon:
    part: "Option-Leading"
    source_node: "Options"
    semantic_rule: "Rendered before the label when Option_Leading=true."
  trailing_icon:
    part: "Option-Trailing"
    source_node: "Options"
    semantic_rule: "Rendered after the label when Option_Trailing=true and Trailing_Icon=true."
  loading_indicator:
    part: "Loading"
    source_node: "Options"
    semantic_rule: "Rendered instead of normal text/icon content for Status=Loading."

layout:
  sizing:
    width: "hug or fill depending on parent container"
    alignment: "center the full content group, not the label alone"
  heights:
    XLarge: 52
    Large: 44
    Medium: 40
    Small: 36
    XSmall: 32
    XXSmall: 24
  horizontal_padding:
    XLarge: "system/size/padding/box/300"
    Large: "system/size/padding/box/250"
    Medium: "system/size/padding/box/200"
    Small: "system/size/padding/box/200"
    XSmall: "system/size/padding/box/150"
    XXSmall: "system/size/padding/box/100"
  inner_gap:
    default: "system/size/padding/box/50"
    expanded: "system/size/padding/box/75"
  radius:
    off: 8
    on: 100

interaction:
  press_hover:
    behavior: "Hover and press use overlay layers without replacing base fill, stroke, or label colors."
  loading:
    behavior: "Loading prevents duplicate requests and replaces normal content with loading indication."
  disabled:
    behavior: "Disabled state must not trigger actions."

implementation_order:
  - "Select variant by Mode, Type, Size, Button_Color, Status, and Radius."
  - "Reject Black Button_Color for Outlined_gray and Ghost types."
  - "Apply Size height and horizontal padding tokens."
  - "Render centered content group with optional leading and trailing content."
  - "Apply Type and Button_Color visual tokens."
  - "Apply Status visual behavior for Hover, Loading, and Disabled."
  - "Use Radius=on as pill and Radius=off as 8px radius."
  - "For bottom speciality buttons, use XLarge and let the parent content area define width."

implementation_coverage:
  axes:
  - "Mode"
  - "Type"
  - "Size"
  - "Button_Color"
  - "Status"
  - "Radius"
  props:
  - "Option_Leading"
  - "Option_Trailing"
  - "Button_Text"
  - "Trailing_Icon"
  - "Trailing_Text"
  assets:
  - "leading_icon"
  - "trailing_icon"
  - "loading_indicator"
  layout:
  - "6 button heights"
  - "size-based padding"
  - "centered content group"
  - "hug or fill width"
  exclusions:
  - "Full 576 variant registry is summarized, not expanded."
  - "This workflow does not create a derived text-button.md file."

rules:
  do:
    - "Use Primary Mint as the default button color."
    - "Use community color only when the service or community context is explicit."
    - "Preserve label typography by button size."
    - "Use Horizontal layout for short labels and Vertical layout for long or multilingual labels."
    - "Place the primary action on the right in horizontal dual-button groups."
    - "Use Triple Button only in vertical layout."
    - "Enable primary buttons only after required information is complete."
  dont:
    - "Do not apply arbitrary colors without a clear reason."
    - "Do not treat colors outside WDS button color properties as common WDS variants."
    - "Do not override label size or weight."
    - "Do not force long labels into a horizontal layout."
    - "Do not place three buttons in a horizontal group."
    - "Do not allow duplicate requests during Loading."

spec_notes:
  source:
  - "Figma component metadata and compact Plugin API extraction from node 52753:39618."
  speciality_button:
    size: "XLarge(52)"
    width_rule: "Fill the parent content area; the button component does not define screen margins."
    bottom_gap: "system/size/padding/box/200 from safe-area or navigation area."
  usage:
  - "Icon Button과 달리 Text Button은 레이블 텍스트가 필수다. 아이콘만으로 행동을 표현할 수 있는 경우에는 Icon Button을 사용한다. 최소 터치 영역(44px 이상)을 별도로 보장해야 한다."
  - "XLarge(52) 타입은 화면 하단 고정 primary CTA 전용이다. 이 크기는 부모 콘텐츠 영역 전체 너비를 채우며, safe-area 하단 간격(system/size/padding/box/200)을 컨테이너에서 추가 처리해야 한다."
