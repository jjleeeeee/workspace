component:
  name: "Text Button"
  figma_name: "Text Button"
  description: "사용자가 선택이나 행동을 실행할 수 있게 하는 텍스트 중심 버튼 컴포넌트"
  figma_file: "DWEduE6GfxYMlyxKPNJ8jA"
  node_id: "52753:39618"
  component_set_key: "70d2a20bcdfe3ac7a3c3190410d9a255d8783e1d"
  last_synced: "2026-05-09"

axes:
  Mode: ["Default", "Fixed"]
  Type: ["Filled", "Outlined_color", "Outlined_gray", "Ghost"]
  Size: ["XLarge(52)", "Large(44)", "Medium(40)", "Small(36)", "XSmall(32)", "XXSmall(24)"]
  Button_Color: ["Default (Gray Ghost 단일컬러)", "Black(Gray Ghost 미적용)"]
  Status: ["Default", "Hover", "Loading", "Disabled"]
  Radius: ["off", "on"]

variants:
  count: 576
  formula: "Mode(2) x Type(4) x Size(6) x valid Button_Color combinations x Status(4) x Radius(2)"
  constraints:
  - "Filled and Outlined_color support both Default and Black Button_Color."
  - "Outlined_gray and Ghost support only Default Button_Color."
  - "The Button_Color constraint produces 576 implemented variants."
  - "Full 576 variant registry is intentionally summarized to keep Description readable."
  registry_policy:
    component_set_key: "70d2a20bcdfe3ac7a3c3190410d9a255d8783e1d"
    sample:
    - {variant: "Mode=Default, Type=Filled, Size=XLarge(52), Button Color=Default (Gray Ghost 단일컬러), Status=Default, Radius=off", node_id: "52753:39619", key: "2f07af62d4a62ca3a0a91240322c8c5ef51c4d99"}
    - {variant: "Mode=Default, Type=Filled, Size=XLarge(52), Button Color=Black(Gray Ghost 미적용), Status=Default, Radius=off", node_id: "69875:19918", key: "1baf8e17d81cf9c38fcb4fb77045241ff36a1b09"}
    - {variant: "Mode=Fixed, Type=Ghost, Size=XXSmall(24), Button Color=Default (Gray Ghost 단일컬러), Status=Disabled, Radius=on", node_id: "52753:45000", key: "ceb3cd29eabeb3efbb98b1ee80074e032bd1cfcb"}
    - {variant: "Mode=Fixed, Type=Ghost, Size=XXSmall(24), Button Color=Default (Gray Ghost 단일컬러), Status=Loading, Radius=on", node_id: "52753:45011", key: "5eb8f2c5f3b6476153de816e89d593c3d79bed9a"}

props:
  Option_Leading:
    type: "boolean"
    default: "false"
    description: "Shows or hides leading content."
  Option_Trailing:
    type: "boolean"
    default: "false"
    description: "Shows or hides trailing content."
  Button_Text:
    type: "text"
    default: "Text"
    description: "Button label text."
  Trailing_Icon:
    type: "boolean"
    default: "true"
    description: "Shows trailing icon option when trailing content is enabled."
  Trailing_Text:
    type: "boolean"
    default: "false"
    description: "Shows trailing text option when trailing content is enabled."

