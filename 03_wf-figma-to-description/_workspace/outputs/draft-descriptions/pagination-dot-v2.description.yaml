implementation_order:
  - "Resolve Mode, Dots, and Selection first."
  - "Render the 120x32 horizontal component with tokenized 12px vertical padding and 6px dot spacing."
  - "For Dots=2 through Dots=5, render one 6px selected dot and remaining 6px unselected dots."
  - "For Dots=6+, render condensed 6px, 4px, and 2px dots according to the selected position."
  - "Apply selected and unselected fill and stroke tokens after the dot size pattern is chosen."

