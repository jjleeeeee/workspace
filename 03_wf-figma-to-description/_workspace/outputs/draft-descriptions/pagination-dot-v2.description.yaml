rules:
  do:
    - "Use Dot Pagination when users only need a lightweight sense of current position."
    - "Use Dot Pagination when exact page count or direct page jumping is not required."
    - "Keep the selected position visually distinct from unselected positions."
  dont:
    - "Do not use Dot Pagination for lists that require direct numeric page navigation."
    - "Do not expose unavailable selections beyond the configured Dots value."
    - "Do not replace dot indicators with text punctuation."

