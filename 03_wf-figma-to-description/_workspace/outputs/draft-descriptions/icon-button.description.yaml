implementation_order:
  - "Resolve Size first and render a square Options frame."
  - "Resolve Radius on the Options frame after size is set."
  - "Apply Type and Button_Color visual tokens for fill or stroke."
  - "Apply State overlays and disabled overrides after base visual tokens."
  - "Render the nested icon_area asset centered inside the Options frame."
  - "Apply icon tint from Type, Button_Color, Mode, and State."

