  - "default_icon_sample"
  layout:
  - "4 square sizes"
  - "20x20 or 12x12 icon area"
  - "Radius on and off"
  - "Outlined 1px stroke"
  exclusions:
  - "Full 192 variant registry is summarized by registry_policy."
  - "This workflow does not create a derived icon-button.md file."

rules:
  do:
    - "Use Icon Button when the action can be understood by a clear icon."
    - "Keep the icon centered in the full square control."
    - "Preserve the DS icon asset and tint tokens."
    - "Use Disabled state when the action is unavailable."
  dont:
    - "Do not replace the icon asset with text content."
    - "Do not apply arbitrary icon or container colors outside the component tokens."
    - "Do not change the icon size independently from the Size variant."
    - "Do not use Icon Button when the action meaning requires a text label."

