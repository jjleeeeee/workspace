  Type:
    type: '"Filled" | "Outlined"'
    default: '"Filled"'
    description: "Filled uses container fill; Outlined uses container stroke with transparent base."
  Size:
    type: '"XLarge(52)" | "Medium(40)" | "Small(36)" | "XXSmall(24)"'
    default: '"XLarge(52)"'
    description: "Controls the square button frame size."
  State:
    type: '"Default" | "Hover" | "Disabled"'
    default: '"Default"'
    description: "Controls interactive and inactive visual treatment."
  Radius:
    type: '"on" | "off"'
    default: '"off"'
    description: "on renders the Options frame as a pill circle; off renders an 8px radius square."
  Button_Color:
    type: '"Default" | "Black"'
    default: '"Default"'
    description: "Controls default brand button color versus black or fixed white treatment."
  Icon:
    type: "instance swap"
    default: "24/em/ic_send_medium"
    description: "Icon content is provided through the nested icon_area instance swap, not as text."

