interaction:
  status:
    behavior: "Status=Disabled applies 0.2 opacity to the component root; Hover(Pressed) preserves the same layout metrics as Default."
  optional_slots:
    behavior: "When a leading, trailing, or divider prop is false, remove the slot and collapse the associated gap."

implementation_order:
- "Resolve Size first because it changes row height, vertical padding, leading media size, and content width."
- "Resolve Mode next because text, icon, and divider tokens switch between adaptive and fixed token families."
- "Apply Status after Mode; Disabled lowers root opacity without replacing text or icon tokens."
- "Apply optional leading, trailing, and divider props last so removed slots collapse their layout gaps."
- "Keep nested Thumbnail, Badge_Dot, Trailing, and Divider components as composition references."

implementation_coverage:
  axes: "Implement all 12 Mode x Size x Status variants."
  props: "Expose Show Divider, Show Trailing, Show Small Leading, and Show Medium Leading as boolean controls."
  assets: "Leading Thumbnail, title Badge_Dot, and trailing arrow icon must remain component or asset backed."
  layout: "Reflect Size-specific row height, padding, leading size, 12px horizontal gaps, 2px title-body gap, and 1px divider."
  exclusions: "Do not implement nested Thumbnail, Badge_Dot, Trailing, Divider, icon_area, or text module internals inside the parent."

rules:
  do:
  - "Use Native List Item for app list rows that need a leading media thumbnail, two-line content, and optional trailing detail."
  - "Choose Small for compact rows and Medium when the leading media needs more visual weight."
  - "Use Default mode for adaptive surfaces and Fixed mode for fixed-color contexts."
  - "Use Disabled only by applying the verified opacity behavior after mode tokens are resolved."
  - "Keep Divider, Trailing, and Leading visibility controlled by their boolean props."
  dont:
  - "Do not replace the nested Thumbnail or Badge_Dot with parent-level CSS primitives."
  - "Do not use arbitrary row heights or leading media sizes outside the Small and Medium metrics."
  - "Do not keep the 12px slot gap when an optional slot is hidden."
  - "Do not use fixed_color tokens in Default mode except for nested child components that own their own token contract."
  - "Do not treat internal icon_area or vector layers as parent-level composition dependencies."
  - "Do not place the Title Badge as a flex item after a full-width title span; it follows the rendered end of the title text."

text_behavior:
  title:
    text_auto_resize: "WIDTH_AND_HEIGHT"
    parent_sizing: "Content and row use hug/min-height behavior in implementation readback."
    overflow_policy: "wrap unless a separate product runtime explicitly opts into clipping or ellipsis."
    row_height_behavior: "Row height grows with wrapped title text; default fixed sample height is not a max-height contract."
    inline_adornments:
    - part: "Content / Title / BadgeDot"
      role: "badge"
      attachment: "rendered-text-end"
      rule: "Badge follows the rendered end of title text, not the full title container end."
  body:
    text_auto_resize: "HEIGHT"
    parent_sizing: "Content and row use hug/min-height behavior in implementation readback."
    overflow_policy: "wrap unless an explicit clipping or ellipsis contract is found."
    row_height_behavior: "Row height grows with wrapped body text."

