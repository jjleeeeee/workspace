interaction:
  ratio:
    behavior: "Choose one of the six supported ratios for a list or card group and keep it consistent within that group."
  optional_items:
    behavior: "Optional overlay modules use the same spec across ratios; expose no more than two icon slots through the item modules."
  image_crop:
    behavior: "Crop image content inside the ratio frame while preserving the representative subject."

implementation_order:
- "Resolve Ratio first because it determines the frame height from the 256px reference width."
- "Apply Radius after Ratio and keep clipping enabled for both radius states."
- "Render the image content as the base media fill."
- "Apply Fill scrim, Button, Left Item, Right Item_top, Right Item_bottom, and Seek bar optional modules after the base image."
- "Preserve nested optional module semantics instead of flattening their icon or text internals into Thumbnail."

implementation_coverage:
  axes: "Implement all 12 Type x Ratio x Radius variants, with Type fixed to Thumbnail."
  props: "Expose Fill, Button, Left Item, Right Item_top, Right Item_bottom, and Seek bar as boolean controls."
  assets: "Image content, optional overlay icon modules, center button, left item tag, and seek bar must remain media or asset/component backed."
  layout: "Reflect all six ratio sizes, 0px and 8px radius states, clipping, overlay module positions, and 2px seek bar height."
  exclusions: "Do not implement nested optional modules, tag internals, icon_area, or placeholder null icon vectors inside the Thumbnail parent."

rules:
  do:
  - "Use Thumbnail when content needs a stable representative image in a supported ratio."
  - "Use one ratio consistently within the same list, card group, or media rail."
  - "Keep width based on the 256px reference and respect the minimum 44px width."
  - "Round ratio-derived decimal dimensions down."
  - "Use optional overlay modules consistently across all ratios and expose at most two icons."
  dont:
  - "Do not mix square and rectangular ratios arbitrarily within one list."
  - "Do not let source image dimensions change the selected Thumbnail ratio."
  - "Do not round ratio-derived dimensions up."
  - "Do not expose three or more overlay icons."
  - "Do not replace media and overlay modules with flattened decorative frames."

spec_notes:
  source:
  - "Live Figma Plugin API readback from component set 50545:51014 on 2026-05-04."
  - "Local variant registry reference: refs/figma-component-keys/variant-keys/thumbnail.md."
  usage:
  - "Thumbnail is for visually identifying content in lists, cards, media, or product contexts."
  - "Supported ratios are 1:1, 3:4, 5:6, 5:8, 9:16, and 16:9."
  - "Optional overlay elements must follow the same spec across ratios."

source_gaps:
- field: "overlay_icon_asset_source"
  issue: "Optional overlay modules contain icon_area placeholders and null icon instances in the component set."
  decision: "Keep the optional modules semantic and require concrete DS icon assets from the consumer context rather than copying placeholder vector internals."
