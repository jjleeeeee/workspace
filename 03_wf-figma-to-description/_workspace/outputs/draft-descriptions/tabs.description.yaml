implementation_order:
- "Resolve Style first because Bar and Chip use different nested tab item components."
- "Resolve Type next to choose Fixed width, Scrollable overflow, or Expand chip behavior."
- "Resolve Size only within the valid Style and Type constraints."
- "Resolve Mode to choose Default or Fixed token families for parent-owned lines, surfaces, and controls."
- "Render selected state through the child tab or chip component rather than duplicating child visual rules."
- "Apply Expand_Button only for Expand(Only Chips) chip variants."

implementation_coverage:
  axes: "Implement all 16 valid Mode x Style x Type x Size variants and reject invalid theoretical combinations."
  props: "Expose Expand_Button and selected_index behavior while keeping one Style and Type per tab group."
  assets: "Use scroll_more arrow and Gradient_color as component-backed assets; child chip badges remain owned by [V2] Chips."
  layout: "Reflect 393px width, 44px Bar height, 48px or 52px Chip heights, 308px Expand height, 16px side padding, and 8px chip gaps."
  exclusions: "Do not use Tabs for top-level app navigation; Bottom Navigation owns that use case."

rules:
  do:
  - "Use Tabs to switch related content within the current screen."
  - "Keep Type, Size, and padding rules consistent within one tab group."
  - "Show a clear selected state for the active tab."
  - "Update the related content immediately when a tab is selected."
  - "Use Marquee behavior for labels that exceed the supported width."
  - "Use Medium size only when image content is included."
  dont:
  - "Do not use Tabs for unrelated page transitions or independent task flows."
  - "Do not mix different tab item types in one group unless the chip usage explicitly supports it."
  - "Do not truncate long labels with an ellipsis."
  - "Do not use Medium size for text-only or icon-only chip tabs."
  - "Do not arbitrarily change horizontal padding."
  - "Do not render selected and unselected tabs with the same visual treatment."

