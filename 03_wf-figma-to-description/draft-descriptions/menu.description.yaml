component:
  name: "Menu"
  figma_name: "[V2] Menu"
  description: "현재 맥락에서 선택 가능한 여러 액션이나 항목을 짧게 보여주는 오버레이 선택 컴포넌트"
  figma_file: "DWEduE6GfxYMlyxKPNJ8jA"
  node_id: "25963:37235"
  component_set_key: "f1e30b43648b4839e2cd69b1de633dd29a408fed"
  last_synced: "2026-05-09"

axes:
  Mode: ["Default", "Fixed"]

variants:
  count: 2
  formula: "Mode(2)"
  constraints:
  - "All Mode values are valid."
  - "Menu item structure is provided by nested [V2] List_Item_Native instances, not by additional Menu variant axes."
  - "Scrollbar is hidden in the base variants and is used for overflow when menu content exceeds max height."
  registry:
  - {variant: "Mode=Default", node_id: "25963:37236", key: "2c9dab8fe97ad77325c7e52a149018aa5a31119b"}
  - {variant: "Mode=Fixed", node_id: "28236:18156", key: "fbaee8c05fa757bc7b4bd8bf785e2f851cc94153"}

props:
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default follows normal surface tokens; Fixed uses fixed surface tokens."
  item_count:
    type: "number"
    default: "9"
    description: "Live variants include nine List_Item_Native rows as the sample menu content."
  position:
    type: '"top" | "bottom" | "center"'
    default: '"bottom"'
    description: "Placement is resolved by trigger position and overlay direction, not by a Figma variant axis."
  max_height:
    type: "number"
    default: "370"
    description: "Menu content must scroll internally when it exceeds 370px height."

tokens:
  surface_default:
    part: "Menu container"
    role: "fill"
    applies_to: "Mode=Default"
