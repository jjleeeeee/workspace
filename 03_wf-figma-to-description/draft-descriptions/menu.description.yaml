    max_height: "370px"
    padding_y: "4px"
    padding_x: "0px"
    radius: "8px"
  list:
    row_count_sample: 9
    row_height: "48px via [V2] List_Item_Native"
    content_height_sample: "432px"
    width_default: "240px"
    width_fixed_live_sample: "180px"
  scrollbar:
    width: "8px"
    default_height_sample: "384px"
    fixed_height_sample: "362px"
    padding: "4px 2px"
    thumb_width: "4px"
    thumb_radius: "3px"
  part_spacing:
    list__to__scrollbar:
      variation_checked_by:
        axes: true
        props: true
        states: true
      default:
        token: "none"
        value: "0px; scrollbar sits in the same horizontal container"
      variants: []

implementation_order:
- "Resolve Mode first to choose Default or Fixed surface and scrollbar thumb tokens."
- "Render menu as a 240px wide overlay with max height 370px and 8px radius."
- "Compose menu rows from [V2] List_Item_Native and keep row height consistent within one Menu."
- "Apply internal scrolling when row content exceeds the max height."
- "Position Menu from the trigger context using top, bottom, or center placement rules."

implementation_coverage:
  axes: "Implement both Default and Fixed Mode variants."
  props: "Support item count, position, and max-height behavior outside the Figma variant axis."
  assets: "No parent-owned icon asset is defined; row-level assets are owned by [V2] List_Item_Native."
  layout: "Reflect 240x370 max component size, 4px vertical padding, 8px radius, 48px list rows, and internal scrollbar behavior."
  exclusions: "Do not copy List_Item_Native internal Leading, Content, Trailing, or Divider specs into Menu."

rules:
  do:
  - "Use Menu for a short list of actions or selectable items in the current context."
  - "Build Menu items with [V2] List_Item_Native."
  - "Keep the trigger location and Menu placement visually related."
  - "Use internal scrolling when menu content exceeds 370px height."
  - "Keep all rows in one Menu structurally consistent."
  dont:
  - "Do not use Menu as an independent navigation page."
  - "Do not put long settings flows or multi-step explanations inside Menu."
  - "Do not mix row heights and row structures within one Menu."
  - "Do not display Menu in a position unrelated to the trigger."
  - "Do not let Menu grow beyond the max height into surrounding screen content."

