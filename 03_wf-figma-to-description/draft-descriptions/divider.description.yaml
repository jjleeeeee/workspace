rules:
  do:
  - "Use Divider to separate content groups without adding semantic content."
  - "Use Height=1 or Height=2 for thin separation."
  - "Use Height=8 only when a stronger section break is needed."
  - "Use Fixed mode only in fixed-theme surfaces."
  dont:
  - "Do not use Divider as a text label or interactive control."
  - "Do not override the fill color outside the Style and Mode tokens."
  - "Do not add icon, text, or radius to the divider."

