props:
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default follows theme outline tokens; Fixed uses fixed outline token families."
  Height:
    type: '"1" | "2" | "8"'
    default: '"1"'
    description: "Controls divider thickness in pixels."
  Style:
    type: '"Default-50a" | "Default-50a-2"'
    default: '"Default-50a"'
    description: "Controls the outline alpha token used for the divider fill."

tokens:
  default_50a:
    part: "divider"
    role: "fill"
    applies_to: "Style=Default-50a"
    default: "system/color/outline/default-50a"
    fixed: "system/fixed_color/outline/default-50a"
    resolved:
      default:
        light: '#0000000A'
        dark: '#FFFFFF0D'
        web_var: --cds-system-color-outline-default-50a
      fixed:
        light: '#FFFFFF0D'
        dark: '#FFFFFF0D'
        web_var: --cds-system-fixed-color-outline-default-50a
  default_50a_2:
    part: "divider"
    role: "fill"
    applies_to: "Style=Default-50a-2"
    default: "system/color/outline/default-50a-2"
    fixed: "system/fixed_color/outline/default-100a"
    resolved:
      default:
        light: '#0000000A'
        dark: '#FFFFFF1A'
        web_var: --cds-system-color-outline-default-50a-2
      fixed:
        light: '#FFFFFF1A'
        dark: '#FFFFFF1A'
        web_var: --cds-system-fixed-color-outline-default-100a
  height_1:
    part: "divider"
    role: "height"
    applies_to: "Height=1"
    value: "1px"
  height_2:
    part: "divider"
    role: "height"
    applies_to: "Height=2"
    value: "2px"
  height_8:
    part: "divider"
    role: "height"
    applies_to: "Height=8"
    value: "8px"

layout:
  component_size:
    width: "393px"
    heights: ["1px", "2px", "8px"]
  divider:
    sizing:
      horizontal: "fill"
      vertical: "fill or fixed by Height"
