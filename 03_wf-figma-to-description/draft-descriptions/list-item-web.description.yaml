interaction:
  status:
    behavior: "States=Disabled applies 0.2 opacity to the state layer; Hover(Pressed) preserves Default layout metrics."
  alignment:
    behavior: "Alignment currently resolves to Center only."
  optional_slots:
    behavior: "When leading, trailing, or divider props are false, remove the slot and collapse the associated gap."

implementation_order:
- "Resolve Size first because it changes row height, vertical padding, leading media size, and content width."
- "Resolve Alignment next; the current component set only supports Center alignment."
- "Resolve Mode before color application because text and icon tokens switch token families."
- "Apply States after Mode; Disabled lowers state-layer opacity without replacing text or icon tokens."
- "Apply optional leading, trailing, and divider props last so removed slots collapse their layout gaps."

implementation_coverage:
  axes: "Implement all 12 Mode x Size x Alignment x States variants, with Alignment fixed to Center."
  props: "Expose Show Trailing, Show Divider, Show Medium Leading, and Show Small Leading as boolean controls."
  assets: "Leading Thumbnail, title Badge_Dot, and trailing arrow icon must remain component or asset backed."
  layout: "Reflect Size-specific row height, padding, leading size, content width, 12px horizontal gaps, and Center alignment."
  exclusions: "Do not implement nested Thumbnail, Badge_Dot, Trailing, Divider, icon_area, or text module internals inside the parent."

rules:
  do:
  - "Use Web List Item for web list rows that need a leading media thumbnail, two-line content, and optional trailing detail."
  - "Keep Alignment=Center unless a new live variant value is added."
  - "Use Default mode for adaptive web surfaces and Fixed mode only in fixed-color contexts."
  - "Apply Disabled through the verified state-layer opacity behavior."
  - "Keep leading, trailing, and divider visibility controlled by their boolean props."
  dont:
  - "Do not create left, right, or stretch alignment variants that are not present in the component set."
  - "Do not replace Thumbnail or Badge_Dot with parent-level CSS primitives."
  - "Do not preserve layout gaps after optional slots are hidden."
  - "Do not use Native typography metrics for Web variants."
  - "Do not treat internal icon_area or vector layers as parent-level composition dependencies."

