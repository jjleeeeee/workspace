props:
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default adapts to OS theme; Fixed stays in fixed dark-theme colors."
  Type:
    type: '"Circle" | "Square"'
    default: '"Circle"'
    description: "Circle is the default checkbox shape; Square is for list-item contexts."
  Status:
    type: '"Default" | "Enabled" | "Disabled"'
    default: '"Default"'
    description: "Default is unchecked, Enabled is checked, Disabled is inactive."

tokens:
  box_stroke_default:
    part: "Box"
    role: "stroke"
    applies_to: "Mode=Default, Status=Default"
    token: "system/color/outline/default-200a"
    resolved:
      light: '#00000033'
      dark: '#FFFFFF33'
      web_var: --cds-system-color-outline-default-200a
  box_stroke_fixed:
    part: "Box"
    role: "stroke"
    applies_to: "Mode=Fixed, Status=Default"
    token: "system/fixed_color/outline/default-200a"
    resolved:
      light: '#FFFFFF33'
      dark: '#FFFFFF33'
      web_var: --cds-system-fixed-color-outline-default-200a
  enabled_bg_default:
    part: "BG"
    role: "fill"
    applies_to: "Mode=Default, Status=Enabled"
    token: "system/color/roles/primary"
    resolved:
      light: '#00CBD5'
      dark: '#01D5DF'
      web_var: --cds-system-color-roles-primary
  enabled_bg_fixed:
    part: "BG"
    role: "fill"
    applies_to: "Mode=Fixed, Status=Enabled"
    token: "system/fixed_color/roles/primary"
    resolved:
      light: '#01D5DF'
      dark: '#01D5DF'
      web_var: --cds-system-fixed-color-roles-primary
  disabled_bg_default:
    part: "BG"
    role: "fill"
    applies_to: "Mode=Default, Status=Disabled"
    token: "system/color/surface/default-reverse-100a"
    resolved:
      light: '#0000001A'
      dark: '#FFFFFF1A'
      web_var: --cds-system-color-surface-default-reverse-100a
  disabled_bg_fixed:
    part: "BG"
    role: "fill"
    applies_to: "Mode=Fixed, Status=Disabled"
    token: "system/fixed_color/surface/default-reverse-100a"
    resolved:
      light: '#FFFFFF1A'
      dark: '#FFFFFF1A'
      web_var: --cds-system-fixed-color-surface-default-reverse-100a
  check_icon_default:
    part: "icon_area"
    role: "icon tint"
    applies_to: "Mode=Default, Status=Enabled"
    token: "system/color/icon/default-reverse"
    resolved:
      light: '#FFFFFF'
      dark: '#000000'
      web_var: --cds-system-color-icon-default-reverse
  check_icon_disabled:
    part: "icon_area"
    role: "icon tint"
    applies_to: "Status=Disabled"
    default: "system/color/icon/200a"
    fixed: "system/fixed_color/icon/200a"
    resolved:
      default:
        light: '#00000033'
        dark: '#FFFFFF33'
        web_var: --cds-system-color-icon-200a
      fixed:
        light: '#FFFFFF33'
        dark: '#FFFFFF33'
        web_var: --cds-system-fixed-color-icon-200a
  icon_size:
    part: "icon_area"
    role: "size"
    token: "system/size/icon/16"

assets:
  check_icon:
    part: "icon_area"
    source_node: "24/em/ic_check_medium"
    semantic_rule: "Visible only for Enabled and Disabled states; Default must not show a gray check icon."

layout:
  component_size: "24x24"
  box_size: "22x22"
  icon_area: "16x16"
  text_gap: 6
  check_mark_text_gap: 6

interaction:
  selection:
    behavior: "Enabled represents selected; Default represents unselected."
  disabled:
    behavior: "Disabled must not trigger selection changes."

implementation_order:
- "Select Mode, Type, and Status variant."
- "Render a 24x24 control with a 22x22 visual box."
- "Use Circle as the default shape and Square only in list-item contexts."
- "Render check icon only for Enabled or Disabled states."
- "Apply mode-specific stroke, fill, and icon tokens."
- "Keep Check Box + Text and Check Mark + Text gaps at 6px when paired with labels."

implementation_coverage:
  axes:
  - "Mode"
  - "Type"
  - "Status"
  props:
  - "Mode"
  - "Type"
  - "Status"
  assets:
  - "check_icon"
  layout:
  - "24x24 component"
  - "22x22 box"
  - "16x16 icon area"
  - "6px label gap"
  exclusions:
  - "This workflow does not create a derived checkbox.md file."

rules:
  do:
  - "Use Check Box when users can select zero, one, multiple, or all options."
  - "Use Check Box for a single agreement, approval, or confirmation."
  - "Use Circle as the default Check Box type."
  - "Use Square only in specified contexts such as List Item."
  - "Use Enabled state to clearly emphasize selected items."
  dont:
  - "Do not use Check Box when users must choose only one option from a group."
  - "Do not mix Square and Circle in the same selection group."
  - "Do not show a gray check icon in Default state."
  - "Do not leave parent and child selection states inconsistent."

spec_notes:
  source:
  - "Figma component metadata and compact Plugin API extraction from node 60365:40276."
