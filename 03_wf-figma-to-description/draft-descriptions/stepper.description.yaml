implementation_order:
- "Render the fixed 104x28 Stepper frame before resolving state."
- "Place subtract, number, and add regions as 28px, 48px, and 28px widths with no gap."
- "Resolve Mode to select Default or Fixed outline, text, and icon token families."
- "Resolve State to enable or disable subtract and add icon treatments."
- "Apply the Label text and optional Caret without resizing the component."
- "Block values above two digits and use State to communicate min or max limits."

implementation_coverage:
  axes: "Implement all 6 Mode x State combinations."
  props: "Expose Caret and Label controls; constrain Label to the two-digit usage rule."
  assets: "Use DS subtract and add icon assets through icon_area semantics."
  layout: "Reflect fixed 104x28 size, 28px side controls, 48px number field, 1px strokes, and 0px internal gaps."
  exclusions: "Do not create arbitrary sizes or allow three-digit values in this component contract."

rules:
  do:
  - "Use Stepper when a small numeric quantity must be adjusted quickly."
  - "Keep Stepper width and height fixed."
  - "Allow direct numeric input and subtract or add button control."
  - "Disable the subtract control when the minimum value is reached."
  - "Disable the add control when the maximum value is reached."
  - "Limit visible input to two digits."
  dont:
  - "Do not resize Stepper based on content length."
  - "Do not allow three-digit values."
  - "Do not show only the number without visible controls."
  - "Do not leave a direction button enabled when the value cannot change in that direction."
  - "Do not replace plus or minus icons with text characters."

