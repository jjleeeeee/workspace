component:
  name: "Stepper"
  figma_name: "[V2] Stepper"
  description: "상품 수량처럼 작은 범위의 숫자 값을 직접 입력하거나 감소와 증가 버튼으로 조정하는 입력 컴포넌트"
  figma_file: "DWEduE6GfxYMlyxKPNJ8jA"
  node_id: "61604:4394"
  component_set_key: "684550ae4653da74717f2599c3da1bb7b7640d73"
  last_synced: "2026-05-09"

axes:
  Mode: ["Default", "Fixed"]
  State: ["Default", "Disabled", "Enabled"]

variants:
  count: 6
  formula: "Mode(2) x State(3)"
  constraints:
  - "All Mode and State combinations are valid."
  - "State=Default represents the normal minimum-edge sample where subtract is disabled and add is enabled."
  - "State=Enabled represents both subtract and add controls enabled."
  - "State=Disabled disables both controls and the numeric label."
  registry:
  - {variant: "Mode=Default, State=Default", node_id: "61604:4395", key: "0a83b0528461a1160cdf2191987253aba33dfb10"}
  - {variant: "Mode=Default, State=Disabled", node_id: "61604:4404", key: "3d3a1d26619b9f4f4a445fbee4756e677b12159b"}
  - {variant: "Mode=Default, State=Enabled", node_id: "61604:4413", key: "dbd35703f40cedfbffc5fc8919e3dc0daf0ccd25"}
  - {variant: "Mode=Fixed, State=Default", node_id: "61604:4422", key: "288984866d159f7bb82d080e525ef83a89c016a4"}
  - {variant: "Mode=Fixed, State=Enabled", node_id: "61604:4431", key: "0344ba07faecd60987f98e512142c57de9adc977"}
  - {variant: "Mode=Fixed, State=Disabled", node_id: "61604:4440", key: "beca73b9a54214b6a102120e9ada030f2287040d"}

props:
  Caret:
    type: "boolean"
    default: "false"
    description: "Shows the text input caret in the Number field."
  Label:
    type: "text"
    default: "99"
    description: "Numeric quantity label. Usage allows up to two digits."
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default follows normal tokens; Fixed uses fixed token families."
  State:
    type: '"Default" | "Disabled" | "Enabled"'
    default: '"Disabled"'
    description: "Controls whether subtract, add, and number value are available."
  value_range:
    type: '"0-99"'
    default: '"99"'
    description: "Consumer-side value must remain within the allowed two-digit range."

