    note: "WeGothicSans is treated as a macOS rendering alias per workflow schema. Live typography-only audit 2026-05-09; Figma font style Medium; 25 text nodes."
  sf_pro_text_regular_unstyled:
    font_family: "SF Pro Text"
    classification: "actual-font"
    system_fallback: "SF Pro Text / iOS system sans-serif"
    token_fallback: "none"
    note: "SF Pro Text is a real iOS/system font family observed in live Figma. Live typography-only audit 2026-05-09; Figma font style Regular; 8 text nodes."
  roboto_caption_xs_system_700:
