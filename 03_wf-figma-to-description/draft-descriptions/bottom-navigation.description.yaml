  node_id: "13361:20295"
  component_set_key: "74f34090918c78b52ca4c2c667494cb72db876ae"
  last_synced: "2026-05-09"

axes:
  Mode: ["Default", "Fixed"]
  OS: ["iOS", "AOS"]
  focus: ["1_Home", "2_Shop", "3_DM", "4_More"]

variants:
