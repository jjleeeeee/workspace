  roboto_caption_xs_system_500:
    font_family: "Roboto"
    classification: "actual-font"
    system_fallback: "Roboto / Android system sans-serif"
    token_fallback: "caption-xs/system-500"
    note: "Roboto is a real Android/system font family observed in live Figma. Live typography-only audit 2026-05-09; Figma font style Medium; 24 text nodes."

assets:
  home_icon:
    part: "Home tab icon"
    role: "icon"
    source: "24/em/ic_gnb_home_enabled_medium | 24/em/ic_gnb_home_disabled_medium"
    applies_to: "focus=1_Home and non-focused Home tab"
    size: "24x24px"
    tint:
      default: "system/color/icon/gray-800"
      fixed: "system/fixed_color/icon/gray-800"
    implementation: "Use existing DS icon asset/component. Do not redraw with CSS."
    semantic_rule: "Icon must remain an icon asset even when its vector shape is simple."
  shop_icon:
    part: "Shop tab icon"
    role: "icon"
    source: "24/em/ic_gnb_shop_enabled_medium | 24/em/ic_gnb_shop_disabled_medium"
    applies_to: "focus=2_Shop and non-focused Shop tab"
    size: "24x24px"
    tint:
      default: "system/color/icon/gray-800"
      fixed: "system/fixed_color/icon/gray-800"
    implementation: "Use existing DS icon asset/component. Do not redraw with CSS."
    semantic_rule: "Icon must remain an icon asset even when its vector shape is simple."
  dm_icon:
    part: "DM tab icon"
    role: "icon"
    source: "24/em/ic_gnb_dm_enabled_medium | 24/em/ic_gnb_dm_disabled_medium"
    applies_to: "focus=3_DM and non-focused DM tab"
    size: "24x24px"
    tint:
      default: "system/color/icon/gray-800"
      fixed: "system/fixed_color/icon/gray-800"
    implementation: "Use existing DS icon asset/component. Do not redraw with CSS."
    semantic_rule: "Icon must remain an icon asset even when its vector shape is simple."
  more_icon:
    part: "More tab icon"
    role: "icon"
    source: "24/em/ic_gnb_more_enabled_medium | 24/em/ic_gnb_more_disabled_medium"
    applies_to: "focus=4_More and non-focused More tab"
    size: "24x24px"
    tint:
      default: "system/color/icon/gray-800"
      fixed: "system/fixed_color/icon/gray-800"
    implementation: "Use existing DS icon asset/component. Do not redraw with CSS."
    semantic_rule: "The three-dot More mark must remain an icon asset, not text content."
  system_home_indicator:
    part: "Home Indicator"
    role: "asset"
    source: "Home Indicator component set"
    applies_to: "Show_System=true"
    size: "iOS bar 134x5px; AOS system controls 100px groups"
    tint:
      default: "system/color/surface/default-reverse | system/color/icon/gray-500"
      fixed: "system/fixed_color/surface/default-reverse | system/color/icon/gray-500"
    implementation: "Use platform system area representation from the DS component."
    semantic_rule: "System indicator visuals are not navigation tabs and should not be treated as tab content."

layout:
  component_size: "393x84px for iOS with system indicator; 393x100px for AOS with system indicator"
  board_size: "1360x1560px"
  gnb:
    height: "50px"
    width: "fill"
    padding_y: "7px"
    border_top: "1px"
  tab_item:
    count: 4
    min_width: "56px"
    width_behavior: "flex equally across available width"
    height: "50px"
    icon_size: "24x24px"
    label_line_height:
      ios: "13px"
      aos: "12px"
    label_text_size:
      ios: "10px"
      aos: "9px"
  home_indicator:
    ios:
      height: "34px"
      padding: "13px 0px 8px"
      bar_size: "134x5px"
      bar_radius: "10px"
    aos:
      height: "50px"
      padding: "8px 30px"
      system_button_width: "100px"
      system_button_height: "34px"
  part_spacing:
    "Icon__to__Label":
      variation_checked_by:
        axes: true
        props: true
        states: true
      default:
        token: "system/size/padding/box/25"
        value: "2px"
      variants: []

implementation_order:
  - "Resolve OS first because iOS and AOS differ in typography size, line height, and system indicator structure."
  - "Resolve Mode next because Default and Fixed determine surface, divider, and fixed color token families."
  - "Resolve focus after Mode and OS; the focused tab receives Enabled icon and Bold label treatment."
  - "Apply Show_System last because it only controls the system indicator area, not the GNB tab layout."
  - "Preserve icon assets and do not replace them with text or CSS primitives."

implementation_coverage:
  axes: "Implement all 16 Mode x OS x focus combinations."
  props: "Expose Show_System as a boolean control; tab item status is derived from focus."
  assets: "Home, Shop, DM, More icons and system indicator visuals must remain asset/component-backed."
  layout: "Reflect 50px GNB height, 4 flexible tab items, 24px icons, 2px icon-label gap, and OS-specific system indicator area."
  exclusions: "Do not add temporary campaign tabs or arbitrary item counts outside this component contract."

rules:
  do:
    - "Use Bottom Navigation for 3-5 top-level destinations that need repeated access."
    - "Keep tab order and position consistent across screens."
    - "Use icon and label together for each navigation option."
    - "Make the active tab visually distinct with Enabled icon treatment and Bold label."
    - "Keep Shop in its fixed service display mode when that service condition applies."
    - "Let each tab area stretch horizontally instead of using a fixed screen-specific tab width."
    - "Use Badge only in the defined position and style when notification state is required."
  dont:
    - "Do not add temporary menus or campaign links as tabs."
    - "Do not show icons without labels."
    - "Do not truncate, wrap, or ellipsize tab labels."
    - "Do not use the same icon style and label weight for active and inactive tabs."
    - "Do not switch Shop Bottom Navigation to dark colors when the service condition requires fixed light display."
    - "Do not manually change Badge position or color."

spec_notes:
  source:
    markitdown: "refs/markitdown-output/markitdown-bottom-navigation.md"
    figma_context: "get_design_context, get_context_for_code_connect, get_variable_defs, Framelink, Desktop Bridge deep extraction"
  usage:
    - "Bottom Navigation is for major app areas that are repeatedly accessed."
    - "It is not for one-off actions or secondary movement inside a page."
    - "Badge usage is allowed only for notification or update meaning."

source_gaps:
  - part: "Badge / number"
    reason: "The component contains hidden number frames and Usage mentions Badge, but the selected visible variants do not expose a concrete Badge visual position/style in the extracted tree."
