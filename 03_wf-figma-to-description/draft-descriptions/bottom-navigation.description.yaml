    - { variant: "Mode=Default, OS=AOS, focus=3_DM", node_id: "13361:20432", key: "a1c1e732daa19af37800d23c5c8b6c314e0eb974" }
    - { variant: "Mode=Default, OS=AOS, focus=4_More", node_id: "13361:20448", key: "cc3f47eb5089b25ff4c47943660d52987a298c31" }

props:
  Show_System:
    type: "boolean"
    default: "true"
    description: "OS home indicator or navigation bar area visibility"
  item_count:
    type: "4"
    default: "4"
    description: "Home, Shop, DM, More are fixed top-level destinations in this component set."
  tab_status:
    type: '"Enabled" | "Default"'
    default: '"Default"'
    description: "Derived per tab from the focus axis. The focused tab is Enabled; the other tabs are Default."
  tab_os:
    type: '"SF" | "Roboto"'
    default: '"SF"'
    description: "Nested tab item typography/icon variant derived from OS=iOS or OS=AOS."

tokens:
  container_surface_default:
    part: "component"
    role: "fill"
    applies_to: "Mode=Default"
    default: "system/color/surface/default"
    fixed: "system/fixed_color/surface/default"
  container_surface_fixed:
    part: "component"
    role: "fill"
    applies_to: "Mode=Fixed"
    default: "system/color/surface/default-reverse"
    fixed: "system/fixed_color/surface/default"
  gnb_divider_default:
    part: "GNB"
    role: "stroke"
    applies_to: "Mode=Default"
    default: "system/color/divide/default-50a"
    fixed: "system/fixed_color/outline/default-reverse-50a"
  gnb_divider_fixed:
    part: "GNB"
    role: "stroke"
    applies_to: "Mode=Fixed"
    default: "system/color/divide/default-50a-2"
    fixed: "system/fixed_color/outline/default-100a"
  icon_enabled_default:
    part: "tab icon"
    role: "fill | stroke"
    applies_to: "Mode=Default, focused tab"
    default: "system/color/icon/gray-800"
    fixed: "system/fixed_color/icon/gray-800"
  icon_enabled_fixed:
    part: "tab icon"
    role: "fill | stroke"
    applies_to: "Mode=Fixed, focused tab"
    default: "system/color/icon/gray-800"
    fixed: "system/fixed_color/icon/gray-800"
  icon_default:
    part: "tab icon"
    role: "fill | stroke"
    applies_to: "unfocused tab"
    default: "system/color/icon/gray-800"
    fixed: "system/fixed_color/icon/gray-800"
  text_enabled_default:
    part: "tab label"
    role: "fill"
    applies_to: "Mode=Default, focused tab"
    default: "system/color/text/gray-800"
    fixed: "system/fixed_color/text/gray-800"
  text_enabled_fixed:
    part: "tab label"
    role: "fill"
    applies_to: "Mode=Fixed, focused tab"
    default: "system/color/text/gray-800"
    fixed: "system/fixed_color/text/gray-800"
  text_default:
    part: "tab label"
    role: "fill"
    applies_to: "unfocused tab"
    default: "system/color/text/gray-800"
    fixed: "system/fixed_color/text/gray-800"
  home_indicator_ios_light:
    part: "Home Indicator / Base"
    role: "fill"
    applies_to: "OS=iOS, Mode=Default"
    default: "system/color/surface/default-reverse"
    fixed: "system/fixed_color/surface/default-reverse"
  home_indicator_aos_light:
    part: "Home Indicator"
    role: "fill"
    applies_to: "OS=AOS, Mode=Default"
    default: "system/color/surface/gray-100-2"
    fixed: "system/color/surface/gray-100-2"
  label_gap:
    part: "tab item"
    role: "spacing"
    applies_to: "icon to label"
    token: "system/size/padding/box/25"
    value: "2px"
  tab_label_typography_ios:
    part: "tab label"
    role: "typography"
    applies_to: "OS=iOS"
    default: "caption-xs/system-500 | caption-xs/system-700"
    fixed: "caption-xs/system-500 | caption-xs/system-700"
  tab_label_typography_aos:
    part: "tab label"
    role: "typography"
    applies_to: "OS=AOS"
    default: "caption-xs/system-500 | caption-xs/system-700"
    fixed: "caption-xs/system-500 | caption-xs/system-700"


typography:
  caption_xs_system_700:
    font_family: "WeGothicSans"
    classification: "system-alias"
    system_fallback: "Apple SD Gothic Neo / SF Pro"
    token_fallback: "caption-xs/system-700"
    note: "WeGothicSans is treated as a macOS rendering alias per workflow schema. Live typography-only audit 2026-05-09; Figma font style Bold; 8 text nodes."
  sf_pro_text_bold_unstyled:
    font_family: "SF Pro Text"
    classification: "actual-font"
    system_fallback: "SF Pro Text / iOS system sans-serif"
    token_fallback: "none"
    note: "SF Pro Text is a real iOS/system font family observed in live Figma. Live typography-only audit 2026-05-09; Figma font style Bold; 33 text nodes."
  caption_xs_system_500:
    font_family: "WeGothicSans"
    classification: "system-alias"
    system_fallback: "Apple SD Gothic Neo / SF Pro"
