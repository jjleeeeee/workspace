    - { variant: "Mode=Default, OS=iOS, focus=1_Home", node_id: "13361:20400", key: "6742945c8c0d560c140240edccfe3af140b14ff9" }
    - { variant: "Mode=Default, OS=iOS, focus=2_Shop", node_id: "13361:20384", key: "1ccdf295789c03cec38cb7347e4eaebd9958b06e" }
    - { variant: "Mode=Default, OS=iOS, focus=3_DM", node_id: "13361:20392", key: "b7872b7ebf558f0e1721ab2441f78b92eef90d1f" }
    - { variant: "Mode=Default, OS=iOS, focus=4_More", node_id: "13361:20408", key: "d926d6cf6943777594ba5b9b721b12a654c261a9" }
