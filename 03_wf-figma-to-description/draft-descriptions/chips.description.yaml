  theoretical_formula: "Mode(2) x Size(2) x Type(3) x State(5) x Radius(2) = 120"
  implemented_formula: "120 - Small/Image combinations(20) = 100"
  constraints:
    - "Image type is implemented only for Size=Medium."
    - "Size=Small supports Text and Icon only."
    - "Radius=ON resolves to pill radius; Radius=OFF resolves to 8px radius."
    - "Badge, Badge_Number, and Marquee are boolean props, not variant axes."
  registry_policy:
    component_set_key: "6f1fa3aadc347f4c8c2f26405695b2415dbdcb95"
    storage: "100 variant node IDs and keys were verified from Figma; full registry is intentionally summarized to keep Description readable."
