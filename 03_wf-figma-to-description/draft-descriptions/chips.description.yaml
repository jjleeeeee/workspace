      - { variant: "Mode=Default, Size=Medium, Type=Text, State=Default, Radius=OFF", node_id: "59869:78922", key: "947c0fe8c2dcd019e37975bf12876ff40006245c" }
      - { variant: "Mode=Default, Size=Small, Type=Text, State=Default, Radius=OFF", node_id: "59869:78932", key: "4001fc50a6a9274e660671e37723da7c7474b08e" }
      - { variant: "Mode=Fixed, Size=Medium, Type=Image (Only Medium), State=Default, Radius=ON", node_id: "67023:33670", key: "bf0f3f97547b51e2008176c6213505209889b58d" }

