implementation_order:
- "Resolve Mode, Size, and Pages first."
- "Choose the 40x40 Large slot or 32x32 Small slot pattern."
- "Render previous control, page number slots, optional ellipsis slot, and next control in order."
- "Apply selected and unselected page text tokens."
- "Apply inactive previous and active next icon tokens after Mode is resolved."
- "Use the nested slot components and icon assets instead of copying child internals into the parent."

implementation_coverage:
  axes:
  - "Mode"
  - "Size"
  - "Pages"
  props:
  - "Mode"
  - "Size"
  - "Pages"
  - "Page labels supplied through nested Label(Pages) properties"
  assets:
  - "prev_arrow"
  - "next_arrow"
  - "ellipsis"
  layout:
  - "Large 40x40 slots"
  - "Small 32x32 slots"
  - "16px vertical padding"
  - "0px slot spacing"
  - "Pages=8+ ellipsis compression"
  exclusions:
  - "This workflow does not create a derived pagination-list-v2.md file."

rules:
  do:
  - "Use List Pagination when users need clear numeric page position and movement control."
  - "Use List Pagination for web lists where exact current page awareness is needed."
  - "Use an ellipsis slot when 8 or more pages are represented."
  - "Place List Pagination below the list."
  dont:
  - "Do not use Dot Pagination alone when exact page movement is required."
  - "Do not expose every page number in a long uncompressed row."
  - "Do not place List Pagination at the top of the page."
  - "Do not force Large size in narrow layouts where it crowds content."

spec_notes:
  pagination_usage:
  - "Local markitdown reference says List Pagination is recommended for web contexts."
  - "Local markitdown reference says 8 or more pages should use Slot and Ellipsis compression."
  - "Local markitdown reference says page count can be exposed up to 999, but the Figma component axis represents Pages=8+ as the compressed visual pattern."
  source:
  - "Figma live read via Framelink and read-only Plugin API extraction from node 61753:7839."
  - "Variant key reference: refs/figma-component-keys/variant-keys/pagination-list-v2.md."
