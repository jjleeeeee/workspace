      fixed: "system/fixed_color/icon/default"
    semantic_rule: "Use the existing arrow icon asset; do not redraw it as CSS or text."
  ellipsis:
    part: "slot_number / number_fixed"
    role: "pagination compression indicator"
    source: "Status=Ellipsis variant of nested number slot"
    applies_to: "Pages=8+"
    size: "Three 2x2 dots with 2px gap"
    semantic_rule: "The ellipsis is a nested component state, not a text string replacement."

