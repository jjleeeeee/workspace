    source: "24/em/ic_arrow_left_medium"
    applies_to: "Previous page control"
    size: "16x16 icon_area inside 40x40 or 32x32 slot"
    tint:
      default: "system/color/icon/200a"
      fixed: "system/fixed_color/icon/200a"
    semantic_rule: "Use the existing arrow icon asset; do not redraw it as CSS or text."
  next_arrow:
    part: "slot_btn / slot_btn_fixed"
    role: "icon"
    source: "24/em/ic_arrow_right_medium"
    applies_to: "Next page control"
    size: "16x16 icon_area inside 40x40 or 32x32 slot"
    tint:
