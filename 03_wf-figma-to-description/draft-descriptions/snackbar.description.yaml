component:
  name: "[V2] Snackbar"
  description: "작업 결과를 알려주고 필요한 경우 선택적 후속 조치를 제공하는 하단 피드백 컴포넌트"
  figma_file: "DWEduE6GfxYMlyxKPNJ8jA"
  node_id: "63694:5774"
  component_set_key: "1d2be6f3586d1004dcb93f999e630377fe2a18c7"
  last_synced: "2026-05-09"

axes:
  Mode: ["Default", "Fixed"]

variants:
  count: 2
  formula: "Mode(2)"
  constraints:
  - "Both Mode variants are present in live Figma."
  - "Icon is a boolean component property, not a variant axis."
  registry:
  - {variant: "Mode=Fixed", node_id: "63694:5775", key: "0bcedf9e6e0bbba92f64d166a22ba9d2fe613728"}
  - {variant: "Mode=Default", node_id: "63694:5789", key: "a2d012aacb80f917c45d67b497f21e357391e628"}

props:
  Label:
    figma_property: "Label#7943:0"
    type: "text"
    default: "Translate it into the following language."
    description: "Snackbar message text; usage guidance limits it to three lines."
  Icon:
    figma_property: "Icon#32952:18"
    type: "boolean"
    default: "false"
    description: "Shows the optional leading status icon when message emphasis is needed."
  Action:
    type: "static text"
    default: "Retry"
    description: "Live Figma exposes a visible Retry label and hidden Cancel label, but no component property for action text or visibility."

