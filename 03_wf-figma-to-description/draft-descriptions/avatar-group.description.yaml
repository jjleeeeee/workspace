component:
  name: "Avatar Group"
  figma_name: "Avatar Group (디자인 개별 사용금지)"
  description: "여러 Avatar를 한 묶음으로 표시하고 필요 시 LIVE 또는 5+ 상태를 함께 표현하는 내부 조합 컴포넌트"
  figma_file: "DWEduE6GfxYMlyxKPNJ8jA"
  node_id: "73587:6404"
  component_set_key: "6ad2e4b184997b01a86fa87e803387200dcca643"
  last_synced: "2026-05-09"

axes:
  Shape: ["Circle", "Squircle"]
  Alignment: ["Tile", "Horizontal"]
  Count: ["1", "2", "3", "4", "5+"]

variants:
  count: 11
  formula: "Implemented subset of Shape(2) x Alignment(2) x Count(5)"
  constraints:
    - "Live Figma currently exposes 11 component variants in this component set."
    - "Circle has Tile and Horizontal variants for Count=1,2,3,4,5+."
    - "Squircle currently has only Alignment=Tile, Count=1 in the live component set."
    - "Live Tag is a boolean component property, not a variant axis."
    - "This component set is marked design individual-use forbidden and is intended as a nested DS composition, especially for Title Header leading identification."
  registry:
    - { variant: "Shape=Circle, Alignment=Tile, Count=1", node_id: "73587:6405", key: "49b35ebaf08d4e5eeba99ca841eaad9acf8dee2f" }
    - { variant: "Shape=Circle, Alignment=Tile, Count=2", node_id: "73587:6409", key: "cfb3db55555d48409f2611680efe555b71f824f9" }
    - { variant: "Shape=Circle, Alignment=Tile, Count=3", node_id: "73587:6418", key: "66f88c5fe87301b45c1c2b2f8bfd4cb03f02b688" }
    - { variant: "Shape=Circle, Alignment=Tile, Count=4", node_id: "73587:6430", key: "3e87c06acb5e008460ae8e2e893926ba0a484e74" }
    - { variant: "Shape=Circle, Alignment=Tile, Count=5+", node_id: "73587:6442", key: "bb1f947ad6dd08ce0a7124c6d797d1f6a17d0010" }
    - { variant: "Shape=Circle, Alignment=Horizontal, Count=1", node_id: "73587:6457", key: "a54a5bf8d681d13c5710723ceccd8bfac6dd5cbb" }
    - { variant: "Shape=Circle, Alignment=Horizontal, Count=2", node_id: "73587:6463", key: "e44e99876817e5de77955a94909c3a6640e5d337" }
    - { variant: "Shape=Circle, Alignment=Horizontal, Count=3", node_id: "73587:6469", key: "18e8b566d939254fc06c99268b188173576baec4" }
    - { variant: "Shape=Circle, Alignment=Horizontal, Count=4", node_id: "73587:6481", key: "738c08e2573631437cc31c804445d7bf7db6bf6e" }
    - { variant: "Shape=Circle, Alignment=Horizontal, Count=5+", node_id: "73587:6493", key: "7f3df57cc3db847f9fdd4cb8b9e9e9559a4d1016" }
    - { variant: "Shape=Squircle, Alignment=Tile, Count=1", node_id: "73587:6510", key: "97cec2eb70f7c1fa69e11aa86f8a5de407303935" }

props:
  Live_Tag:
    figma_property: "Live Tag#62681:0"
    type: "boolean"
    default: "true"
    description: "Shows the LIVE badge in Tile alignment variants."
  Shape:
    type: '"Circle" | "Squircle"'
    default: '"Squircle"'
    description: "Controls whether nested avatars use Circle or Squircle visual treatment when variants exist."
  Alignment:
    type: '"Tile" | "Horizontal"'
    default: '"Tile"'
    description: "Tile stacks the LIVE label below a compact avatar group; Horizontal overlaps avatars in a row."
  Count:
    type: '"1" | "2" | "3" | "4" | "5+"'
    default: '"1"'
    description: "Controls how many avatars are represented; 5+ uses an overflow count indicator."

tokens:
  live_tag_fill:
    part: "Live Tag"
    role: "fill"
    applies_to: "Alignment=Tile, Live_Tag=true"
    token: "system/fixed_color/status/danger-red"
  live_tag_outline:
    part: "Live Tag"
    role: "stroke"
    applies_to: "Alignment=Tile, Live_Tag=true"
    token: "system/fixed_color/outline/default"
  live_tag_text:
    part: "Live Tag / text"
    role: "text fill"
    applies_to: "Alignment=Tile, Live_Tag=true"
    token: "system/fixed_color/text/default"
  overflow_count_text:
    part: "5+ overflow count"
    role: "text fill"
    applies_to: "Count=5+"
    token: "system/fixed_color/text/default"


typography:
  caption_xs_system_700:
    font_family: "WeGothicSans"
    classification: "system-alias"
    system_fallback: "Apple SD Gothic Neo / SF Pro"
    token_fallback: "caption-xs/system-700"
    note: "WeGothicSans is treated as a macOS rendering alias per workflow schema. Live typography-only audit 2026-05-09; Figma font style Bold; 8 text nodes."

assets:
  avatar_instances:
    part: "Avatar group"
    role: "avatar"
    source: "[V2] Avatar"
    component_set_key: "33d955018e09fb10ab89cefc8f00f2662a2b0e39"
    applies_to: "All variants"
    size: "38x38 base for Tile Count=1; 26x26 nested avatars for Horizontal and multi-count groups"
    implementation: "Use nested [V2] Avatar instances and clipping masks from the Avatar Group component; do not redraw avatar shapes in the parent."
    semantic_rule: "Each visible avatar represents an identity target; it is not decorative imagery."
  live_tag:
    part: "Live Tag"
    role: "badge"
    source: "Avatar Group internal Live Tag frame"
    applies_to: "Alignment=Tile, Live_Tag=true"
    size: "29x16px"
    implementation: "Render the LIVE badge only through the Avatar Group contract."
    semantic_rule: "LIVE is a status badge attached to the avatar group, not a generic text label."
  overflow_count_indicator:
    part: "5+ overflow count"
    role: "badge"
    source: "Avatar Group internal num frame"
    applies_to: "Count=5+"
    size: "20x20px count overlay in sampled variants"
    implementation: "Use the Avatar Group overflow count indicator for 5+ rather than replacing it with an external Badge_Number unless the design source changes."
    semantic_rule: "The count indicates additional identities in the group."

composition:
  uses:
    - component: "[V2] Avatar"
      node_id: "62973:7556"
      component_set_key: "33d955018e09fb10ab89cefc8f00f2662a2b0e39"
      role: "individual avatar visual inside the group"
      usage_condition: "All Avatar Group variants"
      spec_owner: "[V2] Avatar Description"

layout:
  component_size: "Component set board 1360x940px; individual variants range from 26x26px to 38x46px or 68x26px."
  tile:
    Count_1: "38x46px, avatar 38x38px, Live Tag 29x16px"
    Count_2: "38x46px, compact avatar stack 38x38px, Live Tag 29x16px"
    Count_3: "38x46px, compact avatar stack 38x38px, Live Tag 29x16px"
    Count_4: "38x46px, compact avatar stack 38x38px, Live Tag 29x16px"
    Count_5_plus: "38x46px, compact avatar stack 38x38px, overflow num, Live Tag 29x16px"
  horizontal:
    Count_1: "26x26px"
    Count_2: "40x26px"
    Count_3: "54x26px"
    Count_4: "68x26px"
    Count_5_plus: "68x26px with overflow num on the fourth slot"
  part_spacing:
    "AvatarGroup__to__LiveTag":
      variation_checked_by:
        axes: true
        props: true
        states: false
      default:
        value: "Tile variants place Live Tag under the avatar group within a 38x46px component."
      variants: []

implementation_order:
  - "Resolve Shape, Alignment, and Count to select an implemented Avatar Group variant."
  - "Use nested [V2] Avatar instances for individual identity visuals."
  - "Apply Live_Tag only in Tile alignment variants where the Live Tag frame exists."
  - "For Count=5+, preserve the internal overflow count indicator."
  - "Treat Avatar Group as a nested composition component, not as a standalone consumer choice."

implementation_coverage:
  axes: "Implement the 11 live variants in the component set and do not infer missing Squircle combinations."
  props: "Expose Live_Tag only where Tile alignment supports the Live Tag frame; keep Shape, Alignment, and Count as variant controls."
  assets: "Nested Avatar, Live Tag, and overflow count visuals must remain component or asset backed."
  layout: "Preserve Tile 38x46px and Horizontal 26px-high overlap metrics from live Figma."
  exclusions: "Do not copy [V2] Avatar internal axes, tokens, or image layout into Avatar Group; Avatar internals are owned by the Avatar component."

rules:
  do:
    - "Use Avatar Group as a nested composition when multiple identities or live identity status must be represented compactly."
    - "Use Tile alignment when the LIVE status label is part of the avatar identity presentation."
    - "Use Horizontal alignment for compact overlapping avatar groups without the LIVE label."
    - "Preserve the 5+ overflow indicator when Count=5+."
  dont:
    - "Do not use Avatar Group as an independently designed standalone component when the Figma label says design individual-use forbidden."
    - "Do not replace nested [V2] Avatar instances with plain image masks or CSS-drawn shapes."
    - "Do not infer unavailable Squircle variants that are not present in live Figma."
    - "Do not replace the Live Tag or 5+ indicator with arbitrary text outside the Avatar Group contract."

spec_notes:
  source:
    - "Live Figma Plugin API readback from component set 73587:6404 on 2026-05-08."
    - "Usage context appears in Title Header leading avatar composition and markitdown-title-header Avatar combination guidance."
  readback:
    - "Component set description was 0 characters before this workflow run."
    - "componentPropertyDefinitions exposes Live Tag boolean plus Shape, Alignment, and Count variant properties."
    - "Live component set currently has 11 children despite variant options implying a larger theoretical matrix."

source_gaps:
  - field: "Squircle variant matrix"
    reason: "Live component set exposes Shape=Squircle only for Alignment=Tile, Count=1 at read time."
    impact: "Do not generate Squircle Horizontal or multi-count Squircle variants until they exist in Figma."
  - field: "Live Tag visibility outside Tile"
    reason: "Live Tag frame was found in Tile variants, not in Horizontal variants."
    impact: "Treat Live_Tag as supported by Tile alignment only unless future Figma variants prove otherwise."
