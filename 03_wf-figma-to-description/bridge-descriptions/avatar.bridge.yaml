    source_note:
      provenance: "04_source_note"
      path: "../04_wf-figma-to-react-components/src/figma/avatar.source.md"
      sections:
        - "Figma Identity"
        - "Source Reads"
        - "Variant Axes"
        - "Figma Props"
        - "Code Mapping"
        - "Size Contract"
        - "Asset Notes"
        - "Parent Composition Sizing Notes"
        - "Host Overlay Contract"
        - "Composition Notes"
        - "Placeholder SVG Mapping"
        - "Known Gaps"
    props:
      axes:
        Mode: { prop: "mode", values: ["default", "fixed"], storybook_control: true }
        Type: { prop: "avatarType", values: ["circle", "squircle"], storybook_control: true }
        Size: { prop: "size", values: ["xxxxlarge", "xxxlarge", "xxlarge", "xlarge", "large", "medium", "small", "xsmall", "xxsmall", "xxxsmall", "tiny"], storybook_control: true }
      properties:
        Ring: { prop: "ring", type: "boolean", default: true, storybook_control: true }
        Birthday_Hat: { prop: "birthdayHat", type: "boolean", default: true, storybook_control: true }
        Emoji: { prop: "emoji", type: "boolean", default: true, storybook_control: true }
        Badge_Dot: { prop: "badgeDot", type: "boolean", default: true, storybook_control: true }
        Host: { prop: "host", type: "boolean", default: true, storybook_control: true }
      runtime_hidden:
        - { prop: "src", reason: "Runtime media content." }
        - { prop: "alt", reason: "Runtime accessibility text." }
        - { prop: "emojiText", reason: "Runtime emoji content." }
        - { prop: "hostSrc", reason: "Runtime nested avatar media content." }
        - { prop: "hostAlt", reason: "Runtime nested avatar accessibility text." }
        - { prop: "componentSize", reason: "Verified parent composition sizing hook." }
        - { prop: "imageSize", reason: "Verified parent composition sizing hook." }
    visual_validation:
      provenance: "04_visual_registry"
      registry_path: "../04_wf-figma-to-react-components/src/figma/visual-registry.json"
      registry_id: "avatar-circle-small-default"
      component: "Avatar"
      story_id: "atoms-avatar--visual-circle-small"
      selector: ".chord-avatar"
      comparison_scope: "structure-only"
      is_parity_gate: false
      expected_size: "46x46"
      visual_scale: 3
      max_diff_pixel_ratio: 0.75
      layout_baseline_path: "../04_wf-figma-to-react-components/src/figma/baselines/avatar-circle-small-default.png"
      visual_baseline_path: "../04_wf-figma-to-react-components/src/figma/baselines/avatar-circle-small-default-3x.png"
    additional_visual_validations:
      - registry_id: "avatar-squircle-medium-default"
        story_id: "atoms-avatar--visual-squircle-medium"
        comparison_scope: "structure-only"
        is_parity_gate: false
        expected_size: "56x56"
    implementation_bridge:
      provenance: "04_source_note"
      findings:
        - "Circle supports ring, birthdayHat, and emoji; Squircle supports badgeDot and host."
        - "Squircle uses exported mask asset src/assets/avatar/squircle-mask.svg instead of border-radius approximation."
        - "Missing or failed avatar images fall back to size-specific placeholder SVGs."
        - "Host overlay is pinned inside the parent frame; do not push Host outside with negative offsets."
        - "Parent components may pass componentSize and imageSize only when verified in the parent source note."
      known_gaps:
        - "Visual registry is structure-only and non-gating because Figma baselines use media/placeholder content."
        - "Draft Badge_Dot default and 04 source-note/code default differ; keep this explicit until a fresh live read resolves the default contract."
  swift:
    status: "not-authored"
    binding_policy:
      - "Use component_contract axes, props, assets, and validation scope as the source model."
      - "Create Swift image loading, placeholder, mask, and overlay mapping under platform_bindings.swift before implementation."
  kotlin:
    status: "not-authored"
    binding_policy:
      - "Use component_contract axes, props, assets, and validation scope as the source model."
      - "Create Kotlin image loading, placeholder, mask, and overlay mapping under platform_bindings.kotlin before implementation."

validation:
  commands:
    - "node tools/validate-component-description.mjs --mode=bridge bridge-descriptions/avatar.bridge.yaml"
    - "cd ../04_wf-figma-to-react-components && npm run visual:diff"
