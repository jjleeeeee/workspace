  purpose: "Platform-neutral component contract plus platform-specific implementation bindings."
  source_draft: "draft-descriptions/checkbox.description.yaml"
  status: "ready"
  updated: "2026-05-11"

component_contract:
  figma:
    file_key: "DWEduE6GfxYMlyxKPNJ8jA"
    node_id: "60365:40276"
    component_set_key: "80eebb7d094726a1a9e864931f4347d76008ca25"
  figma_read_evidence:
    provenance: "live_figma_read"
    source_summary:
      - "Console MCP figma_get_component(60365:40276, enrich=true)"
      - "Console MCP figma_get_component_for_development(60365:40279)"
      - "Console MCP figma_get_component_image(60365:40279, scale=1)"
      - "Console MCP figma_get_component_image(60365:40279, scale=3)"
    representative_nodes:
      - { id: "60365:40279", label: "Mode=Default, Type=Circle, Status=Default" }
  axes:
    Mode: ["Default", "Fixed"]
    Type: ["Circle", "Square"]
    Status: ["Default", "Enabled", "Disabled"]
  props:
    Mode: { type: "Default | Fixed", default: "Default", semantic: "Theme mode." }
    Type: { type: "Circle | Square", default: "Circle", semantic: "Control shape; Square is for list-item contexts." }
    Status: { type: "Default | Enabled | Disabled", default: "Default", semantic: "Default unchecked, Enabled checked, Disabled inactive." }
  assets:
    check_icon: { source: "24/em/ic_check_medium", semantic: "Visible only for Enabled and Disabled states." }
  validation_scope:
    comparison_scope: "full-parity"
    rationale: "Default circle unchecked checkbox is deterministic 24x24 vector/icon-shell content."

platform_bindings:
  react:
    source_note:
      provenance: "04_source_note"
      path: "../04_wf-figma-to-react-components/src/figma/checkbox.source.md"
      sections:
        - "Figma Contract"
        - "MCP Reads"
        - "Props Mapping"
        - "Layout"
        - "Token Mapping"
        - "Font Mapping Notes"
        - "Asset Status"
        - "Known Gaps"
    props:
      axes:
        Mode: { prop: "mode", values: ["default", "fixed"], storybook_control: true }
        Type: { prop: "checkboxType", values: ["circle", "square"], storybook_control: true }
        Status: { prop: "status", values: ["default", "enabled", "disabled"], storybook_control: true }
      runtime_hidden:
        - { prop: "checked", reason: "Native checkbox runtime state." }
        - { prop: "disabled", reason: "Native checkbox runtime state." }
        - { prop: "onChange", reason: "Native checkbox runtime handler." }
    visual_validation:
      provenance: "04_visual_registry"
      registry_path: "../04_wf-figma-to-react-components/src/figma/visual-registry.json"
      registry_id: "checkbox-default"
      component: "Checkbox"
      story_id: "atoms-checkbox--playground"
      selector: ".chord-checkbox"
      comparison_scope: "full-parity"
      is_parity_gate: true
      expected_size: "24x24"
      visual_scale: 3
      max_diff_pixel_ratio: 0.03
      layout_baseline_path: "../04_wf-figma-to-react-components/src/figma/baselines/checkbox-default.png"
      visual_baseline_path: "../04_wf-figma-to-react-components/src/figma/baselines/checkbox-default@3x.png"
    implementation_bridge:
      provenance: "04_source_note"
      findings:
        - "Default representative is Mode=Default, Type=Circle, Status=Default at node 60365:40279."
        - "Component renders a 24x24 control with a centered 22x22 visual box."
        - "Check icon maps to ChordIcon/checkMedium exported from 24/em/ic_check_medium."
        - "Default state must not render a gray check icon."
      known_gaps:
        - "Future work can compare exact icon_area wrapper sizing against additional Checkbox variants."
  swift:
    status: "not-authored"
    binding_policy:
      - "Use component_contract axes, props, assets, and validation scope as the source model."
      - "Create Swift checked/disabled/event mapping under platform_bindings.swift before implementation."
  kotlin:
    status: "not-authored"
    binding_policy:
      - "Use component_contract axes, props, assets, and validation scope as the source model."
      - "Create Kotlin checked/disabled/event mapping under platform_bindings.kotlin before implementation."

validation:
  commands:
    - "node tools/validate-component-description.mjs --mode=bridge bridge-descriptions/checkbox.bridge.yaml"
    - "cd ../04_wf-figma-to-react-components && npm run visual:diff"
