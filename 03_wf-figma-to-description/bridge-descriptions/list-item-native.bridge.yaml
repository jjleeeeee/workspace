    implementation_bridge:
      provenance: "04_source_note"
      findings:
        - "Nested branch coverage is complete/deep-inventoried, but visual parity remains structure-only due media-backed Thumbnail content."
        - "Default text behavior is wrap because title uses textAutoResize=WIDTH_AND_HEIGHT and body uses textAutoResize=HEIGHT."
        - "Title BadgeDot is title-owned inline adornment; do not render it after a full-width title span."
        - "Alpha tokens such as body text 400a and divider outline tokens must not receive extra CSS opacity."
        - "Nested atoms are composed through public props; CSS scale and arbitrary parent overrides are forbidden."
        - "Menu compact row is a verified parent composition branch using inlineSize and hidden runtime props."
      known_gaps:
        - "Figma sample uses concrete Thumbnail media; component default composes Thumbnail no-image state unless thumbnailSrc is supplied."
        - "Visual registry is non-gating structure-only until deterministic media parity is closed."
