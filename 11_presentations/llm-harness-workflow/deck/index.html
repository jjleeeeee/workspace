<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#000; --surface-2:#161616; --surface-3:#1F1F1F; --surface-4:#282828;
  --text:#fff; --gray-600:#999; --gray-500:#777; --accent:#01D5DF;
  --negative:#FE5B58; --border:#282828; --outline:rgba(255,255,255,.05);
  --r-lg:16px; --r-md:8px; --r-sm:4px;
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
body {
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  color:var(--text); -webkit-font-smoothing:antialiased;
}
.deck-wrapper { position:absolute; width:1920px; height:1080px; transform-origin:top left; overflow:hidden; }
.slide {
  position:absolute; inset:0; padding:100px 80px; background:var(--bg);
  display:flex; flex-direction:column; gap:24px; overflow:hidden;
  opacity:0; pointer-events:none; z-index:0;
  transition:opacity .55s cubic-bezier(.22,1,.36,1);
}
.slide.active { opacity:1; pointer-events:auto; z-index:1; }
.slide.is-leaving { opacity:0; pointer-events:none; z-index:2; }
.title { font-size:48px; font-weight:800; line-height:1.2; letter-spacing:-.96px; max-width:1220px; }
.sub { font-size:24px; font-weight:500; line-height:1.6; color:var(--text); max-width:960px; margin-top:-8px; }
.content { flex:1; display:flex; flex-direction:column; justify-content:center; gap:40px; margin-top:56px; }
.accent { color:var(--accent); }

.slide--cover { justify-content:center; gap:30px; background:#D5F3F1; }
.slide--cover::before {
  content:''; position:absolute; inset:0;
  background:url('../../style-kit/assets/background/figma-cover-gradient.svg') center/cover no-repeat;
  z-index:0;
}
.cover-title, .cover-sub, .cover-meta, .cover-logo { position:relative; z-index:1; }
.cover-title { color:#000; font-size:80px; line-height:1.15; letter-spacing:-1.6px; font-weight:800; max-width:1180px; }
.cover-sub { color:#000; font-size:36px; line-height:1.32; font-weight:700; letter-spacing:-.72px; }
.cover-meta { color:rgba(0,0,0,.65); font-size:20px; line-height:1.6; margin-top:auto; }
.cover-logo {
  position:absolute; right:80px; bottom:100px; width:142px; height:20px;
  mix-blend-mode:overlay; pointer-events:none;
}

.slide--coverInvert {
  background:#D5F3F1;
  color:#000;
}
.slide--coverInvert::before {
  content:''; position:absolute; inset:0;
  background:url('../../style-kit/assets/background/figma-cover-gradient.svg') center/cover no-repeat;
  z-index:0;
}
.slide--coverInvert > * {
  position:relative;
  z-index:1;
}
.slide--coverInvert .title,
.slide--coverInvert .sub,
.slide--coverInvert .visual-title {
  color:#000;
}
.slide--coverInvert .sub,
.slide--coverInvert .visual-title {
  opacity:.72;
}
.slide--coverInvert .visual-stage {
  border-color:rgba(0,0,0,.16);
  background:rgba(255,255,255,.28);
}
.slide--coverInvert .visual-stage::before {
  border-color:rgba(0,0,0,.07);
}
.slide--coverInvert .chip {
  color:#000;
  border-color:rgba(0,0,0,.16);
  background:rgba(255,255,255,.44);
}
.slide--coverBg {
  background:#D5F3F1;
  color:#000;
  --bg:#D5F3F1;
  --text:#000;
  --gray-600:rgba(0,0,0,.58);
  --gray-500:rgba(0,0,0,.44);
  --border:rgba(0,0,0,.16);
  --outline:rgba(0,0,0,.08);
  --surface-2:rgba(255,255,255,.3);
  --surface-3:rgba(255,255,255,.42);
  --surface-4:rgba(255,255,255,.55);
}
.slide--coverBg::before {
  content:''; position:absolute; inset:0;
  background:url('../../style-kit/assets/background/figma-cover-gradient.svg') center/cover no-repeat;
  z-index:0;
}
.slide--coverBg > * {
  position:relative;
  z-index:1;
}
.slide--coverBg .title,
.slide--coverBg .sub,
.slide--coverBg .scene-word,
.slide--coverBg .harness-map__pair,
.slide--coverBg .talk-step-title,
.slide--coverBg .bullet-list li,
.slide--coverBg th,
.slide--coverBg td {
  color:#000;
}
.slide--coverBg .sub,
.slide--coverBg .talk-step-desc {
  color:rgba(0,0,0,.58);
}
.slide--llmFlow .sub {
  font-size:24px;
  font-weight:500;
  line-height:1.6;
  margin-top:-8px;
}
.slide--llmFlow .scene-canvas {
  z-index:auto;
}
.slide--coverBg .flow-arrow,
.slide--coverBg .scene-muted {
  color:rgba(0,0,0,.34);
}
.slide--coverBg .flow-chip,
.slide--coverBg .stage-node,
.slide--coverBg .board-shell,
.slide--coverBg .board-node,
.slide--coverBg .chat-dot,
.slide--coverBg .heavy-doc,
.slide--coverBg .module-card,
.slide--coverBg .scatter-tag,
.slide--coverBg .loop-cycle,
.slide--coverBg .loop-step,
.slide--coverBg .folder-node,
.slide--coverBg .table-wrap,
.slide--coverBg .structure-card,
.slide--coverBg .system-map {
  border-color:rgba(0,0,0,.16);
  background:rgba(255,255,255,.3);
}
.slide--coverBg .prompt-line {
  color:#000;
  background:rgba(255,255,255,.3);
}
.slide--coverBg .doc-line {
  background:rgba(0,0,0,.18);
}
.slide--coverBg .plain-center::before {
  display:none;
}
.slide--typingOnly {
  align-items:center;
  justify-content:center;
  background:#D5F3F1;
  color:#000;
}
.slide--typingOnly::before {
  content:''; position:absolute; inset:0;
  background:url('../../style-kit/assets/background/figma-cover-gradient.svg') center/cover no-repeat;
  z-index:0;
}
.slide--typingOnly .typing-line {
  position:relative;
  z-index:1;
}
.slide--graphView {
  background:#D5F3F1;
  color:#000;
}
.slide--graphView::before {
  content:''; position:absolute; inset:0;
  background:url('../../style-kit/assets/background/figma-cover-gradient.svg') center/cover no-repeat;
  z-index:0;
}
.slide--graphView > * {
  position:relative;
  z-index:1;
}
.slide--graphView .title,
.slide--graphView .sub {
  color:#000;
}
.slide--graphView .sub {
  opacity:.68;
}
.graph-keyword {
  position:relative;
  flex:1;
  color:#000;
  font-size:36px;
  line-height:1.35;
  font-weight:800;
  letter-spacing:0;
  white-space:nowrap;
  overflow:hidden;
}
.graph-keyword__field {
  position:absolute;
  left:50%;
  top:50%;
  display:flex;
  flex-direction:column;
  gap:18px;
  transform:translate(-50%, -50%);
  transition:opacity .75s ease, transform .75s cubic-bezier(.22,1,.36,1), filter .75s ease;
}
.graph-keyword__row {
  display:flex;
  justify-content:center;
  gap:36px;
}
.graph-keyword__row:nth-child(even) {
  transform:translateX(-58px);
}
.graph-keyword__row:nth-child(odd) {
  transform:translateX(58px);
}
.graph-keyword span {
  flex:0 0 auto;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .5s ease, transform .5s ease;
  transition-delay:calc(var(--i) * .035s);
}
.graph-keyword__row--center span.is-center,
.graph-keyword.is-expanded .graph-keyword__row--center span,
.graph-keyword.is-stacked span {
  opacity:1;
  transform:translateY(0);
}
.graph-keyword:not(.is-expanded) .graph-keyword__row--center span:not(.is-center),
.graph-keyword:not(.is-stacked) .graph-keyword__row:not(.graph-keyword__row--center) span {
  width:0;
  margin-left:-36px;
  overflow:hidden;
}
.graph-keyword.is-ascii .graph-keyword__field {
  opacity:0;
  transform:translate(-50%, -50%) scale(.72);
  filter:blur(2px);
}
.graph-ascii {
  position:absolute;
  left:50%;
  top:50%;
  display:grid;
  transform:translate(-50%, -50%) scale(1.12);
  opacity:0;
  transition:opacity .9s ease .18s, transform .9s cubic-bezier(.22,1,.36,1) .18s;
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size:9px;
  line-height:1;
  font-weight:800;
  letter-spacing:0;
  color:#000;
  pointer-events:none;
  white-space:pre;
}
.graph-keyword.is-ascii .graph-ascii {
  opacity:1;
  transform:translate(-50%, -50%) scale(1);
}
.graph-ascii span {
  width:9px;
  height:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transform:none;
  transition:none;
}
.graph-stage {
  width:100%;
  height:640px;
  margin-top:16px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.graph-svg {
  width:1560px;
  height:640px;
  overflow:visible;
  mix-blend-mode:soft-light;
}
.blend-test-dot {
  position:absolute;
  left:160px;
  top:430px;
  width:120px;
  height:120px;
  z-index:2;
  mix-blend-mode:overlay;
}
.graph-line,
.graph-link {
  stroke:#000;
  stroke-linecap:round;
  opacity:0;
  mix-blend-mode:normal;
  vector-effect:non-scaling-stroke;
}
.graph-line {
  stroke-width:1.2;
  stroke-dasharray:1;
  stroke-dashoffset:1;
}
.graph-link {
  stroke-width:.75;
  stroke-dasharray:1;
  stroke-dashoffset:1;
}
.graph-node {
  fill:#000;
  opacity:0;
  mix-blend-mode:normal;
  transform:translate(var(--dx), var(--dy)) scale(.2);
  transform-box:fill-box;
  transform-origin:center;
}
.graph-core {
  fill:#000;
  opacity:0;
  mix-blend-mode:normal;
  transform-box:fill-box;
  transform-origin:center;
}
.graph-mesh {
  opacity:1;
}
.slide.active .graph-core {
  animation:graph-core-in .42s ease .18s forwards, graph-core-pulse 1.4s ease-in-out .72s 2;
}
.slide.active .graph-line,
.slide.active .graph-link {
  animation:graph-line-out .92s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay:var(--d);
}
.slide.active .graph-node {
  animation:graph-node-out .92s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay:var(--d);
}
@keyframes graph-core-in {
  from { opacity:0; transform:scale(.4); }
  to { opacity:.28; transform:scale(1); }
}
@keyframes graph-core-pulse {
  50% { transform:scale(1.8); opacity:.18; }
}
@keyframes graph-line-out {
  to { opacity:var(--o); stroke-dashoffset:0; }
}
@keyframes graph-node-out {
  to { opacity:var(--o); transform:translate(0, 0) scale(1); }
}

.slide--toc { flex-direction:row; padding:0; }
.toc-left { width:50%; flex-shrink:0; padding:100px 60px 100px 80px; display:flex; flex-direction:column; justify-content:flex-start; gap:24px; }
.toc-right { width:50%; flex-shrink:0; padding:100px 80px 100px 60px; display:flex; align-items:flex-end; }
.toc-list { display:flex; flex-direction:column; gap:10px; }
.toc-right .toc-list + .toc-list { margin-left:80px; }
.toc-item { display:flex; gap:16px; align-items:baseline; margin-bottom:10px; }
.toc-item .n, .toc-item .t { font-size:24px; line-height:1.4; font-weight:500; }
.toc-item .n { width:28px; flex-shrink:0; color:var(--text); font-weight:700; }
.toc-item .t { color:var(--text); font-weight:500; }

.chapter-slide { justify-content:center; align-items:center; text-align:center; }
.chapter-kicker { font-size:24px; color:var(--accent); font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
.chapter-title { font-size:72px; line-height:1.12; letter-spacing:-1.44px; font-weight:800; max-width:1320px; }

.scene-grid { flex:1; display:grid; grid-template-columns: .9fr 1.1fr; gap:80px; align-items:center; margin-top:36px; }
.message { font-size:72px; line-height:1.14; letter-spacing:-1.44px; font-weight:800; max-width:760px; }
.caption { margin-top:40px; font-size:28px; line-height:1.55; color:var(--gray-600); max-width:760px; }
.content--visual { justify-content:center; margin-top:20px; }
.content--visual .visual-stage { min-height:600px; }
.visual-stage {
  min-height:620px; border:1px solid var(--border); border-radius:var(--r-lg);
  background:var(--surface-2); padding:44px; position:relative; overflow:hidden;
  display:flex; flex-direction:column; justify-content:center; gap:28px;
}
.visual-stage--tools {
  min-height:600px;
  border:0;
  background:transparent;
  padding:0;
}
.visual-stage--tools::before { display:none; }
.visual-stage--typing {
  align-items:center;
  justify-content:center;
}
.visual-stage--typing::before { display:none; }
.typing-line {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
  white-space:nowrap;
  opacity:0;
  color:currentColor;
  font-size:56px;
  line-height:1.2;
  font-weight:800;
}
.typing-line__prompt,
.typing-line__answer {
  display:inline-block;
  overflow:hidden;
  white-space:nowrap;
  width:0;
}
.typing-line__prompt { border-right:3px solid currentColor; }
.typing-line__answer {
  color:#0969ff;
  border-right:3px solid currentColor;
  opacity:0;
  margin-left:.22em;
}
.slide.active .typing-line {
  animation:typing-line-visible .01s linear .6s forwards;
}
.slide.active .typing-line__prompt {
  animation:
    typing-prompt 1.35s steps(9, end) .6s forwards,
    typing-caret .8s step-end .6s 3 forwards;
}
.slide.active .typing-line.show-answer .typing-line__prompt {
  animation:none;
  width:auto;
  border-right:0;
  overflow:visible;
}
.slide.active .typing-line.show-answer .typing-line__answer {
  animation:
    typing-answer .55s steps(2, end) forwards,
    typing-caret .8s step-end infinite;
}
.typing-line.backspacing .typing-line__prompt,
.typing-line.backspacing .typing-line__answer {
  animation:none;
  border-right:0;
  width:0;
  opacity:0;
  overflow:hidden;
  transition:width .72s steps(11, end), opacity .18s ease .54s;
}
.typing-line.backspacing .typing-line__answer {
  transition:width .36s steps(2, end), opacity .14s ease .22s;
}
.typing-line.typing-second .typing-line__prompt {
  color:#000;
  opacity:1;
  border-right:3px solid currentColor;
  animation:
    typing-second-prompt 1.45s steps(18, end) forwards,
    typing-caret .8s step-end 4 forwards;
}
.typing-line.typing-second.show-second-answer .typing-line__prompt {
  animation:none;
  width:auto;
  border-right:0;
  overflow:visible;
}
.typing-line.typing-second.show-second-answer .typing-line__answer {
  color:#0969ff;
  animation:
    typing-second-answer .72s steps(4, end) forwards,
    typing-caret .8s step-end infinite;
}
.typing-line.typing-second.second-answer-done .typing-line__answer {
  animation:none;
  opacity:1;
  width:auto;
  border-right:0;
  overflow:visible;
}
@keyframes typing-line-visible {
  to { opacity:1; }
}
@keyframes typing-prompt {
  to { width:7.15em; }
}
@keyframes typing-answer {
  0% { opacity:1; width:0; }
  100% { opacity:1; width:2.2em; }
}
@keyframes typing-second-prompt {
  from { width:0; }
  to { width:var(--typing-second-prompt-width, 15.3em); }
}
@keyframes typing-second-answer {
  0% { opacity:1; width:0; }
  100% { opacity:1; width:3.35em; }
}
@keyframes typing-caret {
  50% { border-color:transparent; }
}
.slide--typingOnly .typing-line {
  opacity:1;
  animation:none;
}
.slide--typingOnly .typing-line__prompt,
.slide--typingOnly .typing-line__answer,
.slide--typingOnly.active .typing-line__prompt,
.slide--typingOnly.active .typing-line__answer {
  width:auto;
  opacity:1;
  overflow:visible;
  border-right:0;
  animation:none;
}
.slide--typingOnly .typing-line__prompt.has-cursor,
.slide--typingOnly .typing-line__answer.has-cursor {
  border-right:3px solid currentColor;
  animation:typing-caret .8s step-end infinite;
}
.tool-cloud {
  position:relative; z-index:1; width:82%; min-height:500px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between; gap:28px;
  transition:opacity 1.1s cubic-bezier(.22,1,.36,1);
}
.tool-icon {
  width:180px; height:180px; border-radius:32px;
  border:0; background:transparent;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  opacity:0; transform:translateY(10px) scale(.96);
}
.slide.active .tool-icon { animation:tool-dissolve .55s ease forwards; }
.slide.active .tool-icon:nth-child(1) { animation-delay:.42s; }
.slide.active .tool-icon:nth-child(2) { animation-delay:.85s; }
.slide.active .tool-icon:nth-child(3) { animation-delay:1.28s; }
.slide.active .tool-icon:nth-child(4) { animation-delay:1.71s; }
.slide.active .tool-icon:nth-child(5) { animation-delay:2.14s; }
@keyframes tool-dissolve {
  to { opacity:1; transform:translateY(0) scale(1); }
}
.tool-logo { width:96px; height:96px; object-fit:contain; display:block; }
.tool-question {
  position:absolute; left:0; right:0; top:50%; z-index:2;
  color:var(--text); font-size:36px; line-height:1.35; font-weight:800; text-align:center;
  transform:translateY(-50%);
}
.visual-stage--tools.has-question .tool-cloud { opacity:.2; }
.tool-question span {
  display:block; opacity:0; transform:translateY(8px);
  transition:opacity .55s ease, transform .55s ease;
}
.tool-question.is-visible span { opacity:1; transform:translateY(0); }
.visual-stage::before {
  content:''; position:absolute; inset:44px; border:1px solid var(--outline);
  border-radius:var(--r-md); pointer-events:none;
}
.visual-stage.has-image {
  padding:0;
  border-color:rgba(255,255,255,.12);
}
.visual-stage.has-image::before {
  content:''; inset:0; border:0; border-radius:var(--r-lg);
  background:linear-gradient(90deg, rgba(0,0,0,.18), rgba(0,0,0,0) 42%, rgba(0,0,0,.28));
  z-index:1;
}
.visual-image {
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  filter:saturate(.86) contrast(1.06) brightness(.82);
}
.visual-stage.has-image .visual-title {
  position:absolute; left:36px; right:36px; bottom:32px; z-index:2;
  color:rgba(255,255,255,.74); text-shadow:0 2px 12px rgba(0,0,0,.55);
}
.visual-title { position:relative; z-index:1; font-size:24px; color:var(--gray-600); line-height:1.5; }
.keyword-row { position:relative; z-index:1; display:flex; flex-wrap:wrap; gap:14px; }
.chip {
  font-size:24px; line-height:1; font-weight:700; color:var(--text);
  border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:14px 22px;
  background:var(--surface-3);
}
.chip.accent-chip { background:var(--accent); color:#000; border-color:var(--accent); }
.diagram { position:relative; z-index:1; height:260px; display:flex; align-items:center; justify-content:center; gap:22px; }
.node {
  min-width:150px; min-height:92px; padding:18px 22px; border-radius:var(--r-md);
  border:1px solid rgba(255,255,255,.22); background:var(--surface-3);
  display:flex; align-items:center; justify-content:center; text-align:center;
  font-size:22px; line-height:1.35; font-weight:700;
}
.node.accent-node { border:2px solid var(--accent); color:var(--accent); }
.arrow { font-size:28px; color:var(--gray-600); font-weight:700; }
.quote-mark { position:absolute; right:44px; top:28px; font-size:160px; color:rgba(255,255,255,.04); font-weight:800; line-height:1; }
.horse-line {
  position:relative; z-index:1; width:520px; height:220px; margin:0 auto;
  border-bottom:2px solid var(--accent); border-radius:50%;
}
.horse-line::before, .horse-line::after {
  content:''; position:absolute; border:2px solid var(--text); border-radius:50%;
}
.horse-line::before { width:300px; height:126px; left:86px; top:54px; border-left-color:transparent; border-bottom-color:transparent; transform:rotate(-8deg); }
.horse-line::after { width:78px; height:78px; right:96px; top:28px; border-left-color:transparent; transform:rotate(22deg); }
.bars { position:relative; z-index:1; display:flex; flex-direction:column; gap:18px; }
.bar { display:grid; grid-template-columns:150px 1fr; gap:20px; align-items:center; font-size:22px; color:var(--gray-600); }
.track { height:32px; border-radius:999px; background:var(--surface-4); overflow:hidden; }
.fill { height:100%; border-radius:999px; background:var(--accent); }

.noise-bubble:nth-child(7) { left:4%; top:43%; --bubble-delay:.28s; }
.noise-bubble:nth-child(8) { left:35%; top:41%; --bubble-delay:1.44s; }

const deck = document.getElementById('deck');
const toc = document.getElementById('toc');

const tocColumns = [chapters.slice(0, 5), chapters.slice(5)];
tocColumns.forEach((column, columnIndex) => {
  const list = document.createElement('div');
  list.className = 'toc-list';
  column.forEach((title, i) => {
    const number = columnIndex * 5 + i + 1;
    const item = document.createElement('div');
    item.className = 'toc-item';
    item.innerHTML = `<span class="n">${String(number).padStart(2, '0')}</span><span class="t">${title}</span>`;
    list.appendChild(item);
  });
  toc.appendChild(list);
});

function visualHTML(s) {
  if (s.tools) return `<div class="tool-cloud">${s.tools.map((name) => {
    const file = name.toLowerCase();
    return `<div class="tool-icon"><img class="tool-logo" src="../assets/logos/${file}.svg" alt="${name}"></div>`;
  }).join('')}</div><div class="tool-question"><span>к·ёлһҳм„ң лӯҳ мҚЁм•јн•ҳм§Җ?</span></div>`;
  if (s.typingText) return `<div class="typing-line">${s.typingText}</div>`;
  if (s.image) return `<img class="visual-image" src="${s.image}" alt=""><p class="visual-title">${s.visual}</p>`;
  if (s.horse) return `<div class="quote-mark">вҖң</div><div class="horse-line"></div><p class="visual-title">${s.visual}</p>`;
  if (s.flow) return `<div class="diagram">${s.flow.map((x,i)=>`<div class="node ${i===s.flow.length-1?'accent-node':''}">${x}</div>${i<s.flow.length-1?'<div class="arrow">вҶ’</div>':''}`).join('')}</div><p class="visual-title">${s.visual}</p>`;
  if (s.bars) return `<div class="bars">${s.bars.map(([name,val])=>`<div class="bar"><span>${name}</span><div class="track"><div class="fill" style="width:${val}%"></div></div></div>`).join('')}</div><p class="visual-title">${s.visual}</p>`;
  if (s.split) return `<div class="split-list">${s.split.map(([a,b])=>`<div class="mini-card"><strong>${a}</strong><span>${b}</span></div>`).join('')}</div><p class="visual-title">${s.visual}</p>`;
  const chips = s.chips || [];
  return `<div class="keyword-row">${chips.map(x=>`<span class="chip ${x===s.accent?'accent-chip':''}">${x}</span>`).join('')}</div><p class="visual-title">${s.visual}</p>`;
}

function compareHTML(s) {
  const card = (kind, data) => `
    <div class="circle-card ${kind}">
      <p class="circle-label">${data.label}</p>
      <p class="circle-headline">${data.head}</p>
      <ul class="circle-list">${data.items.map(item => `<li>${item}</li>`).join('')}</ul>
    </div>`;
  return `
    <h1 class="title">${s.msg}</h1>
    <p class="sub">${s.cap}</p>
    <div class="content">
      <div class="asis-tobe">
        ${card('asis', s.left)}
        <div class="asis-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </div>
        ${card('tobe', s.right)}
      </div>
    </div>`;
}

function talkFlowHTML(s) {
  return `
    <h1 class="title">${s.msg}</h1>
    <p class="sub">${s.cap}</p>
    <div class="content">
      <div class="talk-flow">
        ${s.items.map(([title, desc], i) => `
          <div class="talk-step">
            <div class="talk-step-num">${String(i + 1).padStart(2, '0')}</div>
            <div class="talk-step-title">${title}</div>
            <p class="talk-step-desc">${desc}</p>
          </div>`).join('')}
      </div>
    </div>`;
}

function infoNoiseHTML(s) {

    <div class="content">
      <div class="noise-board">
        <div class="noise-bubble-layer">

          ${images.map((src, i) => `<img class="noise-image" src="${src}" alt="AI media capture ${i + 1}">`).join('')}

    <h1 class="title">${s.msg}</h1>
    <p class="sub">${s.cap}</p>`;
}

function typingOnlyHTML(s) {
  return `<div class="typing-line" data-step="idle" data-first-prompt="${s.typingText}" data-second-prompt="м•„м№Ём—җ мқјм–ҙлӮҳм„ң к°ҖмһҘ лЁјм Җ н•ҳлҠ” мқјмқҖ"><span class="typing-line__prompt"></span><span class="typing-line__answer"></span></div>`;
}

function graphViewHTML(s) {
  const patternRow = (className = '') => Array.from({ length:11 }, (_, i) => `<span class="${i === 5 ? 'is-center' : ''}" style="--i:${Math.abs(i - 5)}">л¬ёмһҘВ·нҢЁн„ҙ</span>`).join('');
  const rowCount = 15;
  const centerRow = Math.floor(rowCount / 2);
  const patternRows = Array.from({ length:rowCount }, (_, i) => {
    const rowClass = i === centerRow ? 'graph-keyword__row--center' : '';
    return `<div class="graph-keyword__row ${rowClass}">${patternRow()}</div>`;
  }).join('');
  return `
    <h1 class="title">${s.msg}</h1>
    <p class="sub">${s.cap}</p>
    <div class="graph-keyword" data-ascii-src="../assets/images/image-10.jpg"><div class="graph-keyword__field">${patternRows}</div><div class="graph-ascii" aria-hidden="true"></div></div>`;
}

function stepStyle(index) {
  return `style="--d:${(index * .12).toFixed(2)}s"`;
}

function chipList(items) {

function llmFlowHTML(s) {
  const pairs = [
    ['мһ‘м—… лІ”мң„ м§Ҳл¬ё', 'мһ‘м—… лӢЁмң„ лӢөліҖ', 0, 0],
    ['мҡ°м„ мҲңмң„ м§Ҳл¬ё', 'л§ҲмқјмҠӨнҶӨ лӢөліҖ', 0, 1],
    ['лІ”мң„ мЎ°м • м§Ҳл¬ё', 'м ңмҷё н•ӯлӘ© лӢөліҖ', 0, 2],
    ['мӮ¬мҡ©мһҗ нқҗлҰ„ м§Ҳл¬ё', 'м—¬м • кө¬мЎ° лӢөліҖ', 1, 0],
    ['нҷ”л©ҙ кө¬мЎ° м§Ҳл¬ё', 'м •ліҙ кө¬мЎ° лӢөліҖ', 1, 1],
    ['м»ҙнҸ¬л„ҢнҠё м§Ҳл¬ё', 'м»ҙнҸ¬л„ҢнҠё лӘ©лЎқ лӢөліҖ', 1, 2],
    ['кө¬нҳ„ мҲңм„ң м§Ҳл¬ё', 'мқҳмЎҙм„ұ лӢөліҖ', 2, 0],
    ['мҪ”л“ң мҙҲм•Ҳ м§Ҳл¬ё', 'мҪ”л“ң кө¬мЎ° лӢөліҖ', 2, 1],
    ['м—Јм§Җ мјҖмқҙмҠӨ м§Ҳл¬ё', 'мҳҲмҷё мЎ°кұҙ лӢөліҖ', 3, 0],
    ['QA кё°мӨҖ м§Ҳл¬ё', 'кІҖмҰқ н•ӯлӘ© лӢөліҖ', 3, 1]
  ];
  const groupLabels = ['кі„нҡҚ','м„Өкі„','кө¬нҳ„','кІҖмҰқ'];
  const groupX = ['12.5%','37.5%','62.5%','87.5%'];
  const groupY = ['18%','37%','56%'];
  const toNumber = (value) => Number.parseFloat(value);
  const fullWidth = 1760;
  const sideWidth = 620;
  const answerFieldLeft = fullWidth - sideWidth;
  const fieldHeight = 516;
  const travelStyle = (side, x, y, group, row) => {
    const itemLeft = (side === 'answer' ? answerFieldLeft : 0) + sideWidth * toNumber(x) / 100;
    const itemTop = fieldHeight * toNumber(y) / 100;
    const targetLeft = fullWidth * toNumber(groupX[group]) / 100;
    const targetTop = fieldHeight * toNumber(groupY[row]) / 100;
    return `--tx:${Math.round(targetLeft - itemLeft)}px;--ty:${Math.round(targetTop - itemTop)}px;`;
  };
  const questionPositions = [
    ['25%','8%','.92s'],
    ['31%','16%','1.04s'],
    ['20%','24%','1.16s'],
    ['35%','32%','1.28s'],
    ['23%','40%','1.40s'],
    ['31%','48%','1.52s'],
    ['18%','56%','1.64s'],
    ['30%','64%','1.76s'],
    ['24%','72%','1.88s'],
    ['34%','80%','2.00s']
  ];
  const answerPositions = [
    ['25%','8%','4.55s'],
    ['35%','16%','4.67s'],
    ['19%','24%','4.79s'],
    ['31%','32%','4.91s'],
    ['23%','40%','5.03s'],
    ['37%','48%','5.15s'],
    ['18%','56%','5.27s'],
    ['30%','64%','5.39s'],
    ['41%','72%','5.51s'],
    ['32%','80%','5.63s']
  ];
  const groupStyle = (group, row, i) => `--gx:${groupX[group]};--gy:${groupY[row]};--gd:${(.08 + i * .025).toFixed(3)}s`;
  const connectorData = [
    [0, 0],
    [1, 0],
    [2, 0],
    [3, 0]
  ];
  const itemRow = (mark, i, answer = false) => `
    <div class="llm-flow__pair-row">
      <span class="llm-flow__pair-mark">${mark}</span>
      <span class="llm-flow__pair-lines" style="--w1:${answer ? (i % 2 ? '90%' : '72%') : (i % 2 ? '76%' : '88%')};--w2:${answer ? (i % 3 ? '64%' : '48%') : (i % 3 ? '52%' : '66%')}"><span></span><span></span></span>
    </div>`;
  const questionHTML = pairs.map(([question, answer, group, row], i) => {
    const [x, y, d] = questionPositions[i];
    return `<div class="llm-flow__item llm-flow__item--question" aria-label="${question}" style="--x:${x};--y:${y};--d:${d};--from-x:-36px;${groupStyle(group, row, i)}${travelStyle('question', x, y, group, row)}">${itemRow('Q', i)}</div>`;
  }).join('');
  const answerHTML = pairs.map(([question, answer, group, row], i) => {
    const [x, y, d] = answerPositions[i];
    return `<div class="llm-flow__item llm-flow__item--answer" aria-label="${answer}" style="--x:${x};--y:${y};--d:${d};--from-x:-28px;${groupStyle(group, row, i + pairs.length)}${travelStyle('answer', x, y, group, row)}">${itemRow('A', i, true)}</div>`;
  }).join('');
  const pairHTML = pairs.map(([question, answer, group, row], i) => (
    `<div class="llm-flow__pair-card" aria-label="${question} / ${answer}" style="${groupStyle(group, row, i)}">
      <div class="llm-flow__pair-row">
        <span class="llm-flow__pair-mark">Q</span>
        <span class="llm-flow__pair-lines" style="--w1:${i % 2 ? '76%' : '88%'};--w2:${i % 3 ? '52%' : '66%'}"><span></span><span></span></span>
      </div>
      <div class="llm-flow__pair-row">
        <span class="llm-flow__pair-mark">A</span>
        <span class="llm-flow__pair-lines" style="--w1:${i % 2 ? '90%' : '72%'};--w2:${i % 3 ? '64%' : '48%'}"><span></span><span></span></span>
      </div>
    </div>`
  )).join('');
  const groupLabelsHTML = groupLabels.map((label, i) => (
    `<div class="llm-flow__group-label" style="--gi:${i}">${label}</div>`
  )).join('');
  const groupBackdropHTML = groupLabels.map(() => '<div class="llm-flow__group-column"></div>').join('');
  const connectorHTML = connectorData.map(([group, row], i) => (
    `<span class="llm-flow__group-connector" style="--gx:${groupX[group]};--gy:${groupY[row]};--gi:${i}"></span>`
  )).join('');
  const pulsesHTML = Array.from({ length:3 }, (_, i) => (
    `<span class="llm-flow__pulse" style="--d:${(2.85 + i * .36).toFixed(2)}s"></span>`
  )).join('');
  const logos = ['chatgpt','claude','cursor','gemini','perplexity'];
  const logosHTML = logos.map((logo) => (
    `<span class="llm-flow__logo-tile"><img src="../assets/logos/${logo}.svg" alt=""></span>`
  )).join('');
  return `
    <h1 class="title">${s.msg}</h1>
    <p class="sub">${s.cap}</p>
    <div class="scene-canvas">
      <div class="llm-flow step-reveal" aria-label="м§Ҳл¬ёмқҙ LLM лӘЁлҚёмқ„ м§ҖлӮҳ лӢөмңјлЎң лӮҳмҳӨлҠ” нқҗлҰ„">
        <div class="llm-flow__group-labels">${groupLabelsHTML}</div>
        <div class="llm-flow__group-backdrop">${groupBackdropHTML}</div>
        <div class="llm-flow__group-connectors">${connectorHTML}</div>
        <div class="llm-flow__pair-layer">${pairHTML}</div>
        <div class="llm-flow__panel-bg llm-flow__panel-bg--questions" aria-hidden="true"></div>
        <div class="llm-flow__panel-bg llm-flow__panel-bg--model" aria-hidden="true"></div>
        <div class="llm-flow__panel-bg llm-flow__panel-bg--answers" aria-hidden="true"></div>
        <div class="llm-flow__panel llm-flow__panel--questions">
          <div class="llm-flow__label">Question</div>
        </div>
        <div class="llm-flow__field llm-flow__field--questions">
          <div class="llm-flow__items llm-flow__items--questions">${questionHTML}</div>
        </div>
        <div class="llm-flow__stage-arrow llm-flow__stage-arrow--left">вҶ’</div>
        <div class="llm-flow__panel llm-flow__panel--model">
          <div class="llm-flow__label">LLM</div>
        </div>
        <div class="llm-flow__field llm-flow__field--model">
          <div class="llm-flow__core" aria-hidden="true">
            ${pulsesHTML}
            <div class="llm-flow__logo-grid">${logosHTML}</div>
          </div>
        </div>
        <div class="llm-flow__stage-arrow llm-flow__stage-arrow--right">вҶ’</div>
        <div class="llm-flow__panel llm-flow__panel--answers">
          <div class="llm-flow__label">Answer</div>
        </div>
        <div class="llm-flow__field llm-flow__field--answers">
          <div class="llm-flow__items llm-flow__items--answers">${answerHTML}</div>
        </div>
      </div>
    </div>`;
}

slides.forEach((s, index) => {
  const section = document.createElement('section');
  const actualSlideNumber = index + 3;
  const coverBgClass = actualSlideNumber >= 6 ? ' slide--coverBg' : '';
  section.className = s.closing ? `slide slide--closing${coverBgClass}` : `slide ${s.type ? `slide--${s.type}` : ''}${coverBgClass}`;
  const detail = detailHTML(s);
  section.innerHTML = detail || (s.closing
    ? `<h2 class="message">${s.msg}</h2><p class="caption">${s.cap}</p>`
    : `<h1 class="title">${s.msg}</h1>${s.cap ? `<p class="sub">${s.cap}</p>` : ''}<div class="content content--visual"><div class="visual-stage ${s.image ? 'has-image' : ''} ${s.tools ? 'visual-stage--tools' : ''} ${s.typingText ? 'visual-stage--typing' : ''}">${visualHTML(s)}</div></div>`);
  deck.appendChild(section);
});

const allSlides = [...document.querySelectorAll('.slide')];
let current = 0;
let transitionTimer = null;

function resizeDeck() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  deck.style.transform = `scale(${scale})`;
  deck.style.left = `${(window.innerWidth - 1920 * scale) / 2}px`;
  deck.style.top = `${(window.innerHeight - 1080 * scale) / 2}px`;
}

function go(index) {
  const target = Math.max(0, Math.min(index, allSlides.length - 1));
  if (target === current) return;
  clearTimeout(transitionTimer);

  const from = current;
  const to = target;
  const shouldFadeOutIn = from === 4 && to === 5;

  if (shouldFadeOutIn) {
    const leaving = allSlides[from];
    const entering = allSlides[to];
    allSlides.forEach((slide, i) => {
      if (i !== from && i !== to) slide.classList.remove('active', 'is-leaving');
    });
    leaving.classList.add('active', 'is-leaving');
    entering.classList.remove('active', 'is-leaving');
    current = to;
    history.replaceState(null, '', `#${current + 1}`);
    transitionTimer = setTimeout(() => {
      leaving.classList.remove('active', 'is-leaving');
      entering.classList.add('active');
      startTypingOnlySlide(entering);
    }, 560);
    return;
  }

  current = target;
  allSlides.forEach((slide, i) => {
    slide.classList.toggle('active', i === current);
    slide.classList.remove('is-leaving');
  });
  history.replaceState(null, '', `#${current + 1}`);
  startTypingOnlySlide(allSlides[current]);
}

function next() { go(current + 1); }
function prev() { go(current - 1); }

const typingTimers = new WeakMap();
const wait = (ms) => new Promise(resolve => window.setTimeout(resolve, ms));

function setTypingCursor(line, target) {
  line.querySelectorAll('.has-cursor').forEach(el => el.classList.remove('has-cursor'));
  if (target) target.classList.add('has-cursor');
}

async function typeText(element, text, speed = 58) {
  element.textContent = '';
  for (const char of text) {
    element.textContent += char;
    await wait(speed);
  }
}

async function backspaceText(element, speed = 22) {
  while (element.textContent.length > 0) {
    element.textContent = element.textContent.slice(0, -1);
    await wait(speed);
  }
}

function startTypingOnlySlide(slide) {
  if (!slide?.classList.contains('slide--typingOnly')) return;
  const line = slide.querySelector('.typing-line');
  const prompt = line.querySelector('.typing-line__prompt');
  const answer = line.querySelector('.typing-line__answer');
  window.clearTimeout(typingTimers.get(line));
  line.dataset.step = 'intro';
  line.dataset.animating = 'true';
  prompt.textContent = '';
  answer.textContent = '';
  setTypingCursor(line, null);
  const timer = window.setTimeout(async () => {
    setTypingCursor(line, prompt);
    await typeText(prompt, line.dataset.firstPrompt, 78);
    line.dataset.step = 'first-ready';
    line.dataset.animating = 'false';
  }, 600);
  typingTimers.set(line, timer);
}

function runTypingAction(line, action) {
  if (line.dataset.animating === 'true') return true;
  line.dataset.animating = 'true';
  action().finally(() => {
    line.dataset.animating = 'false';
  });
  return true;
}

function handleTypingAdvance(line) {
  const prompt = line.querySelector('.typing-line__prompt');
  const answer = line.querySelector('.typing-line__answer');
  if (line.dataset.animating === 'true') return true;

  if (line.dataset.step === 'first-ready') {
    return runTypingAction(line, async () => {
      setTypingCursor(line, answer);
      await typeText(answer, 'м„ңмҡё', 105);
      line.dataset.step = 'first-answer';
    });
  }

  if (line.dataset.step === 'first-answer') {
    return runTypingAction(line, async () => {
      setTypingCursor(line, answer);
      await backspaceText(answer, 48);
      setTypingCursor(line, prompt);
      await backspaceText(prompt, 30);
      await typeText(prompt, line.dataset.secondPrompt, 62);
      line.dataset.step = 'second-ready';
    });
  }

  if (line.dataset.step === 'second-ready') {
    return runTypingAction(line, async () => {
      setTypingCursor(line, answer);
      await typeText(answer, 'м„ёмҲҳн•ҳкё°', 92);
      line.dataset.step = 'answer-1';
    });
  }

  if (line.dataset.step === 'answer-1') {
    return runTypingAction(line, async () => {
      setTypingCursor(line, answer);
      await backspaceText(answer, 48);
      await typeText(answer, 'н•ёл“ңнҸ°ліҙкё°', 84);
      line.dataset.step = 'answer-2';
    });
  }

  if (line.dataset.step === 'answer-2') {
    return runTypingAction(line, async () => {
      setTypingCursor(line, answer);
      await backspaceText(answer, 48);
      await typeText(answer, 'м»Өн”јл§ҲмӢңкё°', 84);
      line.dataset.step = 'done';
    });
  }

  return false;
}

function buildPatternAscii(container) {
  if (container.dataset.asciiReady === 'true' || container.dataset.asciiLoading === 'true') return;
  container.dataset.asciiLoading = 'true';
  const target = container.querySelector('.graph-ascii');
  const image = new Image();
  image.src = container.dataset.asciiSrc;
  image.onload = () => {
    const cols = 76;
    const rows = 52;
    const canvas = document.createElement('canvas');
    canvas.width = cols;
    canvas.height = rows;
    const ctx = canvas.getContext('2d', { willReadFrequently:true });
    ctx.drawImage(image, 0, 0, cols, rows);
    const { data } = ctx.getImageData(0, 0, cols, rows);
    const letters = ['л¬ё','мһҘ','нҢЁ','н„ҙ'];
    const cells = [];
    for (let y = 0; y < rows; y += 1) {
      for (let x = 0; x < cols; x += 1) {
        const index = (y * cols + x) * 4;
        const r = data[index];
        const g = data[index + 1];
        const b = data[index + 2];
        const brightness = (r + g + b) / 3;
        const isDarkDetail = brightness < 92 || (brightness < 142 && r < 120 && g < 130 && b < 120);
        if (!isDarkDetail) {
          cells.push('<span></span>');
          continue;
        }
        const weight = Math.max(.28, Math.min(.95, (150 - brightness) / 118));
        const char = letters[(x + y) % letters.length];
        cells.push(`<span style="opacity:${weight.toFixed(2)}">${char}</span>`);
      }
    }
    target.style.gridTemplateColumns = `repeat(${cols}, 9px)`;
    target.innerHTML = cells.join('');
    container.dataset.asciiReady = 'true';
    container.dataset.asciiLoading = 'false';
  };
  image.onerror = () => {
    container.dataset.asciiLoading = 'false';
  };
}

function advance() {
  const question = document.querySelector('.slide.active .tool-question');
  if (question && !question.classList.contains('is-visible')) {
    question.closest('.visual-stage--tools')?.classList.add('has-question');
    question.classList.add('is-visible');
    return;
  }
  const typingLine = document.querySelector('.slide.active.slide--typingOnly .typing-line');
  if (typingLine && handleTypingAdvance(typingLine)) return;
  const graphKeyword = document.querySelector('.slide.active.slide--graphView .graph-keyword');
  if (graphKeyword && !graphKeyword.classList.contains('is-expanded')) {
    graphKeyword.classList.add('is-expanded');
    return;
  }
  if (graphKeyword && !graphKeyword.classList.contains('is-stacked')) {
    graphKeyword.classList.add('is-stacked');
    return;
  }
  if (graphKeyword && !graphKeyword.classList.contains('is-ascii')) {
    buildPatternAscii(graphKeyword);
    graphKeyword.classList.add('is-ascii');
    return;
  }
  const noiseBoard = document.querySelector('.slide.active .noise-board');
  if (noiseBoard && !noiseBoard.classList.contains('show-images')) {
    noiseBoard.classList.add('show-images');
    return;
  }
  if (noiseBoard && !noiseBoard.classList.contains('show-message')) {
    noiseBoard.classList.add('show-message');
    return;
  }
  const llmFlow = document.querySelector('.slide.active .llm-flow');
  if (llmFlow && !llmFlow.classList.contains('is-grouped')) {
    llmFlow.classList.add('is-grouped');
    return;
  }
  const stepReveal = document.querySelector('.slide.active .step-reveal');
  if (stepReveal && !stepReveal.classList.contains('is-revealed')) {
    stepReveal.classList.add('is-revealed');
    return;
  }
  next();
}

window.addEventListener('resize', resizeDeck);
document.addEventListener('keydown', (e) => {
  if (['ArrowRight','ArrowDown',' ','PageDown','Enter'].includes(e.key)) { e.preventDefault(); advance(); }
  if (['ArrowLeft','ArrowUp','PageUp','Backspace'].includes(e.key)) { e.preventDefault(); prev(); }
});
document.addEventListener('click', () => {
  advance();
});

let startX = 0;
document.addEventListener('touchstart', (e) => { startX = e.changedTouches[0].clientX; }, { passive:true });
document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 40) dx < 0 ? next() : prev();
}, { passive:true });

resizeDeck();
const initial = Number(location.hash.replace('#',''));
go(Number.isFinite(initial) && initial > 0 ? initial - 1 : 0);
</script>
