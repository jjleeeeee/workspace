props:
  Title_Label:
    type: "text"
    default: "Title"
    description: "Title text shown when Show Title is true."
  Guide_Message:
    type: "boolean"
    default: "true"
    description: "Controls guide or validation message visibility."
  Country_Code:
    type: "boolean"
    default: "true"
    description: "Controls the country code prefix group in Single line variants."
  Multi_line_Label:
    type: "text"
    default: "일이삼사오육"
    description: "Multiple line text content."
  Scrollbar:
    type: "boolean"
    default: "true"
    description: "Controls Scrollbar visibility in Multiple line variants."
  Character_Counter_Label:
    type: "text"
    default: "12/200"
    description: "Character counter label text."
  Character_Counter:
    type: "boolean"
    default: "true"
    description: "Controls character counter visibility in the title row."
  Show_Badge_Dot:
    type: "boolean"
    default: "true"
    description: "Controls Badge_Dot visibility beside the title."
  Show_Title:
    type: "boolean"
    default: "true"
    description: "Controls title row visibility."
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default uses adaptive color tokens; Fixed uses fixed_color tokens."
  Lines:
    type: '"Single" | "Multiple"'
    default: '"Single"'
    description: "Single is for one-line input; Multiple is for multi-line text."
  Status:
    type: '"Default" | "Disabled" | "Enabled" | "Error" | "Success"'
    default: '"Default"'
    description: "Controls inactive, disabled, focused, error, and success visual states."

