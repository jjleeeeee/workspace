typography:
  body_s_system_400:
    font_family: "WeGothicSans"
    classification: "system-alias"
    system_fallback: "Apple SD Gothic Neo / SF Pro"
    token_fallback: "body-s/system-400"
    note: "WeGothicSans is treated as a macOS rendering alias per workflow schema. Live typography-only audit 2026-05-09; Figma font style Regular; 6 text nodes."

assets:
  search_icon:
    part: "icon_area"
    role: "icon"
    source: "icon_area, size=xsmall(16), em=On"
    applies_to: "All variants"
    size: "16x16px"
    implementation: "Use the existing search icon slot in icon_area."
    semantic_rule: "Search purpose must be communicated with an icon, not only placeholder text."
  clear_button:
    part: "Delete Icon"
    role: "icon"
    source: "icon/20/ic_delete and 공통요소 / 인풋박스 / ic_input_X"
    applies_to: "Enabled and Completed states"
    size: "24x24px"
    implementation: "Use the existing clear icon component for deleting the whole query."
    semantic_rule: "Clear action must remain an interactive icon button, not a text X."

layout:
  component_set:
    width: 1360
    height: 428
  variant:
    width: 361
    height: 36
    direction: "horizontal"
    radius: 24
    item_spacing_default: 12
    item_spacing_fixed_completed: 8
  search_bar:
    width: 361
    height: 36
    direction: "horizontal"
    gap: 8
    padding: "6px 12px"
    radius: 24
  input_area:
    width: 305
    height: 24
    gap: 4
  icons:
    search_icon: "16x16px"
    clear_icon: "24x24px"
  part_spacing:
    "Search_Icon__to__Text":
      variation_checked_by:
        axes: true
        props: true
        states: true
      default:
        value: "4px inside input area"
      variants: []
    "Input_Area__to__Clear_Button":
      variation_checked_by:
        axes: true
        props: true
        states: true
      default:
        value: "8px inside Search Bar"
      variants: []

implementation_order:
  - "Resolve Mode first because Default and Fixed use different token families."
  - "Resolve State next to switch placeholder text, query text, caret, and clear action visibility."
  - "Render the search icon before the input label in every variant."
  - "Render clear button only when the component is active or populated."
  - "Keep the 36px pill search bar, 12px horizontal padding, and 24px radius."

implementation_coverage:
  axes: "Implement all 6 Mode x State variants."
  props: "Expose Label as the text content control for placeholder or search query."
  assets: "Preserve search icon and clear icon as icon-backed visuals."
  layout: "Reflect 361x36 search bar, 24px radius, 12px horizontal padding, 8px bar gap, and 16px search icon."
  exclusions: "Do not create a results list in this component Description; result feedback belongs to the surrounding search experience."

rules:
  do:
    - "Use Search when users enter a keyword to narrow or find content."
    - "Show the search icon before the input text."
    - "Provide a clear action while a query is active or completed."
    - "Connect result count or no-result feedback near the search context outside this field."
    - "Open the keyboard when the enabled search field is focused."
  dont:
    - "Do not make Search look like a generic text field without the search icon."
    - "Do not hide the clear action when a query is present."
    - "Do not visually treat an enabled search box as disabled."
    - "Do not detach search results from the query context."

spec_notes:
  source:
  - "Live Figma readback from component set 59722:17972 on 2026-05-04."
  - "Variant key snapshot: refs/figma-component-keys/variant-keys/search.md."
  usage:
  - "Search is an input component for query entry, not a generic Text Field substitute."
  - "Live readback has a legacy rich-text description value, but this draft stores YAML only in plain description."

source_gaps:
  - field: "legacy_description_markdown"
    confirmed: true
    reason: "Live readback reports existing rich-text description length 16; no Figma write was requested, so this draft does not clear it."
  - part: "search icon"
    confirmed: true
    reason: "The icon_area instance confirms a 16px icon slot, but the exact selected search icon component key was not returned as a component set."
baseline:
