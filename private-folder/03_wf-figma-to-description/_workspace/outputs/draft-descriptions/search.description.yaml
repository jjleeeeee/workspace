component:
  name: "Search"
  figma_name: "[V2] Search"
  description: "키워드를 입력해 원하는 정보나 결과를 찾는 검색 입력 컴포넌트"
  figma_file: "DWEduE6GfxYMlyxKPNJ8jA"
  node_id: "59722:17972"
  component_set_key: "cbcd2baf8a758cd859c194359b69faf7fa3e543a"
  last_synced: "2026-05-09"

axes:
  Mode: ["Default", "Fixed"]
  State: ["Default", "Enabled", "Completed"]

variants:
  count: 6
  formula: "Mode(2) x State(3)"
  constraints:
  - "All Mode and State combinations are implemented."
  - "Label is a text component property, not a variant axis."
  registry:
  - {variant: "Mode=Default, State=Default", node_id: "59722:17973", key: "d455cda2821f776c79c12fc451fe92f527406650"}
  - {variant: "Mode=Default, State=Enabled", node_id: "59722:17986", key: "f3ebde5ec61aeae719550549371fefce873058b5"}
  - {variant: "Mode=Default, State=Completed", node_id: "59722:17998", key: "dcfbf828f3bf36255f90867756ab8d674e1b25bc"}
  - {variant: "Mode=Fixed, State=Default", node_id: "59722:18010", key: "a9aef86d9671516fad65b68a1c76e576f267f16b"}
  - {variant: "Mode=Fixed, State=Enabled", node_id: "59722:18016", key: "2a667f4884fe254dd46268566355dab0178eaa81"}
  - {variant: "Mode=Fixed, State=Completed", node_id: "59722:18036", key: "cf3643e8293a9ab5d5982642c8daf979f906a832"}

props:
  Label:
    type: "text"
    default: "Search"
    description: "Placeholder or query text shown inside the search input."
  Mode:
    type: '"Default" | "Fixed"'
    default: '"Default"'
    description: "Default uses adaptive color tokens; Fixed uses fixed_color tokens."
  State:
    type: '"Default" | "Enabled" | "Completed"'
    default: '"Default"'
    description: "Default is empty, Enabled is active typing, Completed is populated search text."

