<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WDSCheckbox — Chord Design System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 32px; }

  :root {
    --clr-line-default: #e0e0e0;
    --clr-btn-default: #00cbd5;
    --clr-text-reverse: #ffffff;
    --clr-text-sub: rgba(0,0,0,0.5);
    --clr-text-default: #000000;
  }

  /* ── Checkbox ────────────────────────────────────────────── */
  .wds-checkbox {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .wds-checkbox--disabled {
    opacity: 0.38;
    pointer-events: none;
  }

  .wds-checkbox__input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    pointer-events: none;
  }

  .wds-checkbox__box {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    border: 1.5px solid var(--clr-line-default);
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  /* circle type (BottomPopup default) */
  .wds-checkbox--circle .wds-checkbox__box { border-radius: 999px; }
  /* square type */
  .wds-checkbox--square .wds-checkbox__box { border-radius: 4px; }

  .wds-checkbox__input:checked + .wds-checkbox__box {
    background: var(--clr-btn-default);
    border-color: var(--clr-btn-default);
  }
  .wds-checkbox__input:checked + .wds-checkbox__box .wds-checkbox__check {
    display: block;
  }
  .wds-checkbox__check {
    display: none;
  }

  .wds-checkbox__label {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--clr-text-sub);
  }

  /* ── Preview ─────────────────────────────────────────────── */
  .preview { max-width: 375px; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .preview + .preview { margin-top: 20px; }
  .preview__label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 12px; }
  .row { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>

<div class="preview">
  <p class="preview__label">Circle (BottomPopup default) — unchecked / checked</p>
  <div class="row">
    <label class="wds-checkbox wds-checkbox--circle">
      <input class="wds-checkbox__input" type="checkbox">
      <span class="wds-checkbox__box">
        <svg class="wds-checkbox__check" width="14" height="10" viewBox="0 0 14 10" fill="none">
          <path d="M1.5 5L5.5 9L12.5 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="wds-checkbox__label">텍스트를 입력해주세요</span>
    </label>

    <label class="wds-checkbox wds-checkbox--circle">
      <input class="wds-checkbox__input" type="checkbox" checked>
      <span class="wds-checkbox__box">
        <svg class="wds-checkbox__check" width="14" height="10" viewBox="0 0 14 10" fill="none">
          <path d="M1.5 5L5.5 9L12.5 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="wds-checkbox__label">텍스트를 입력해주세요</span>
    </label>
  </div>
</div>

<div class="preview">
  <p class="preview__label">Square — unchecked / checked</p>
  <div class="row">
    <label class="wds-checkbox wds-checkbox--square">
      <input class="wds-checkbox__input" type="checkbox">
      <span class="wds-checkbox__box">
        <svg class="wds-checkbox__check" width="14" height="10" viewBox="0 0 14 10" fill="none">
          <path d="M1.5 5L5.5 9L12.5 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="wds-checkbox__label">텍스트를 입력해주세요</span>
    </label>

    <label class="wds-checkbox wds-checkbox--square">
      <input class="wds-checkbox__input" type="checkbox" checked>
      <span class="wds-checkbox__box">
        <svg class="wds-checkbox__check" width="14" height="10" viewBox="0 0 14 10" fill="none">
          <path d="M1.5 5L5.5 9L12.5 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="wds-checkbox__label">텍스트를 입력해주세요</span>
    </label>
  </div>
</div>

<div class="preview">
  <p class="preview__label">Disabled</p>
  <div class="row">
    <label class="wds-checkbox wds-checkbox--circle wds-checkbox--disabled">
      <input class="wds-checkbox__input" type="checkbox" disabled>
      <span class="wds-checkbox__box">
        <svg class="wds-checkbox__check" width="14" height="10" viewBox="0 0 14 10" fill="none">
          <path d="M1.5 5L5.5 9L12.5 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="wds-checkbox__label">비활성화 상태</span>
    </label>
  </div>
</div>

</body>
</html>
