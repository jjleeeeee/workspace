<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WDSTopNavigation — Chord Design System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 32px; }

  :root {
    --clr-text-default: #000000;
    --clr-surface: #ffffff;
    --h-nav: 48px;
    --icon-slot: 40px;
  }

  /* ── TopNavigation ───────────────────────────────────────── */
  .wds-topnav {
    display: flex;
    align-items: center;
    height: var(--h-nav);
    padding: 0 4px;
    background: var(--clr-surface);
    width: 100%;
    position: relative;
  }

  .wds-topnav__action {
    width: var(--icon-slot);
    height: var(--icon-slot);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--clr-text-default);
    border-radius: 8px;
    transition: background 0.12s;
  }
  .wds-topnav__action:hover { background: rgba(0,0,0,0.06); }
  .wds-topnav__action--invisible {
    visibility: hidden;
    pointer-events: none;
  }

  .wds-topnav__title {
    flex: 1;
    font-size: 16px;
    font-weight: 700;
    color: var(--clr-text-default);
    line-height: 1.3;
    /* BottomPopup 명세: 타이틀 반드시 좌측 정렬 */
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 4px;
  }

  /* ── Preview ─────────────────────────────────────────────── */
  .preview { max-width: 375px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .preview + .preview { margin-top: 20px; }
  .preview__label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; padding: 12px 16px 8px; background: #f9f9f9; border-bottom: 1px solid #eee; }
</style>
</head>
<body>

<!-- Default: title + close -->
<div class="preview">
  <p class="preview__label">Default — left-spacer + title + close</p>
  <header class="wds-topnav" role="banner">
    <span class="wds-topnav__action wds-topnav__action--invisible" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2L2 8l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </span>
    <h2 class="wds-topnav__title">Title</h2>
    <button class="wds-topnav__action" aria-label="닫기" onclick="alert('close')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </header>
</div>

<!-- Back + title + close -->
<div class="preview">
  <p class="preview__label">leftContent=back + title + close</p>
  <header class="wds-topnav" role="banner">
    <button class="wds-topnav__action" aria-label="뒤로가기">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h2 class="wds-topnav__title">Title</h2>
    <button class="wds-topnav__action" aria-label="닫기">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </header>
</div>

<!-- No close -->
<div class="preview">
  <p class="preview__label">showClose=false</p>
  <header class="wds-topnav" role="banner">
    <span class="wds-topnav__action wds-topnav__action--invisible" aria-hidden="true"></span>
    <h2 class="wds-topnav__title">Title</h2>
    <span class="wds-topnav__action wds-topnav__action--invisible" aria-hidden="true"></span>
  </header>
</div>

</body>
</html>
