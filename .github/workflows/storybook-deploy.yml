name: Deploy Storybook

on:
  push:
    branches: [main]
    paths:
      - "private-folder/04_wf-figma-to-react-components/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: private-folder/04_wf-figma-to-react-components/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: private-folder/04_wf-figma-to-react-components

      - name: Build Storybook
        run: npm run build-storybook
        working-directory: private-folder/04_wf-figma-to-react-components

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: private-folder/04_wf-figma-to-react-components/storybook-static

      - id: deployment
        uses: actions/deploy-pages@v4
