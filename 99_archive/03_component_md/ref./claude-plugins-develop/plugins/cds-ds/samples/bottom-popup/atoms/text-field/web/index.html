<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WDSTextField — Chord Design System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 32px; }

  /* ── Tokens ───────────────────────────────────────────────── */
  :root {
    --clr-line-default: #e0e0e0;
    --clr-btn-default: #00cbd5;
    --clr-text-default: #000000;
    --clr-text-hint: rgba(0,0,0,0.3);
    --clr-text-sub: rgba(0,0,0,0.5);
    --clr-error: #f44336;
    --clr-surface: #ffffff;
    --radius-input: 8px;
    --h-input: 48px;
  }

  /* ── TextField Wrapper ───────────────────────────────────── */
  .wds-textfield {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
  }

  /* Title row */
  .wds-textfield__title-row {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .wds-textfield__title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--clr-text-default);
  }
  .wds-textfield__required {
    font-size: 13px;
    color: var(--clr-error);
  }

  /* Input row */
  .wds-textfield__input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    height: var(--h-input);
    padding: 0 12px;
    background: var(--clr-surface);
    border: 1px solid var(--clr-line-default);
    border-radius: var(--radius-input);
    transition: border-color 0.15s;
  }
  .wds-textfield__input-row:focus-within {
    border-color: var(--clr-btn-default);
    outline: none;
  }
  .wds-textfield__input-row--error {
    border-color: var(--clr-error);
  }

  .wds-textfield__input {
    flex: 1;
    font-size: 15px;
    font-weight: 400;
    color: var(--clr-text-default);
    background: transparent;
    border: none;
    outline: none;
    line-height: 1.4;
  }
  .wds-textfield__input::placeholder {
    color: var(--clr-text-hint);
  }

  .wds-textfield__clear {
    display: none;
    width: 20px;
    height: 20px;
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
    color: var(--clr-text-hint);
  }
  .wds-textfield__clear:hover { color: var(--clr-text-default); }
  .wds-textfield__clear svg { display: block; }

  /* Footer row */
  .wds-textfield__footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 16px;
  }
  .wds-textfield__guide {
    font-size: 11px;
    font-weight: 400;
    color: var(--clr-text-sub);
    line-height: 1.4;
  }
  .wds-textfield__guide--error { color: var(--clr-error); }
  .wds-textfield__counter {
    font-size: 11px;
    font-weight: 400;
    color: var(--clr-text-sub);
    line-height: 1.4;
    margin-left: auto;
  }

  /* Disabled */
  .wds-textfield--disabled .wds-textfield__input-row {
    opacity: 0.38;
    pointer-events: none;
  }
  .wds-textfield--disabled .wds-textfield__title { opacity: 0.38; }

  /* ── Preview Layout ──────────────────────────────────────── */
  .preview { max-width: 375px; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .preview + .preview { margin-top: 24px; }
  .preview__label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- Default: title + counter + hint -->
<div class="preview">
  <p class="preview__label">Default — title + counter + hint</p>
  <div class="wds-textfield" id="tf1">
    <div class="wds-textfield__title-row">
      <span class="wds-textfield__title">입력 필드</span>
    </div>
    <div class="wds-textfield__input-row">
      <input class="wds-textfield__input" type="text" placeholder="입력해주세요" maxlength="200" data-maxlength="200" data-counter="counter1">
      <button class="wds-textfield__clear" aria-label="텍스트 지우기" tabindex="-1">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" fill="currentColor" opacity="0.2"/>
          <path d="M7 7l6 6M13 7l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="wds-textfield__footer">
      <span class="wds-textfield__counter" id="counter1">0/200</span>
    </div>
  </div>
</div>

<!-- Required + guide message + error -->
<div class="preview">
  <p class="preview__label">Required + guide + error state</p>
  <div class="wds-textfield" id="tf2">
    <div class="wds-textfield__title-row">
      <span class="wds-textfield__title">입력 필드</span>
      <span class="wds-textfield__required">*</span>
    </div>
    <div class="wds-textfield__input-row wds-textfield__input-row--error">
      <input class="wds-textfield__input" type="text" placeholder="입력해주세요" maxlength="200">
      <button class="wds-textfield__clear" aria-label="텍스트 지우기" tabindex="-1">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" fill="currentColor" opacity="0.2"/>
          <path d="M7 7l6 6M13 7l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="wds-textfield__footer">
      <span class="wds-textfield__guide wds-textfield__guide--error">필수 입력 항목입니다</span>
    </div>
  </div>
</div>

<!-- No title + counter -->
<div class="preview">
  <p class="preview__label">No title + counter</p>
  <div class="wds-textfield" id="tf3">
    <div class="wds-textfield__input-row">
      <input class="wds-textfield__input" type="text" placeholder="입력해주세요" maxlength="100" data-maxlength="100" data-counter="counter3">
    </div>
    <div class="wds-textfield__footer">
      <span class="wds-textfield__counter" id="counter3">0/100</span>
    </div>
  </div>
</div>

<!-- Disabled -->
<div class="preview">
  <p class="preview__label">Disabled</p>
  <div class="wds-textfield wds-textfield--disabled" id="tf4">
    <div class="wds-textfield__title-row">
      <span class="wds-textfield__title">입력 필드</span>
    </div>
    <div class="wds-textfield__input-row">
      <input class="wds-textfield__input" type="text" placeholder="비활성화" disabled>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('.wds-textfield__input').forEach(input => {
    const maxlen = input.dataset.maxlength;
    const counterId = input.dataset.counter;
    const counterEl = counterId ? document.getElementById(counterId) : null;
    const row = input.closest('.wds-textfield__input-row');
    const clearBtn = row?.querySelector('.wds-textfield__clear');

    function update() {
      const len = input.value.length;
      if (counterEl) counterEl.textContent = `${len}/${maxlen}`;
      if (clearBtn) clearBtn.style.display = len > 0 ? 'block' : 'none';
    }

    input.addEventListener('input', update);
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        input.value = '';
        update();
        input.focus();
      });
    }
    update();
  });
</script>
</body>
</html>
